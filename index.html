<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#faf4ee">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Übezeit&quot;,&quot;short_name&quot;:&quot;Übezeit&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23faf4ee&quot;,&quot;theme_color&quot;:&quot;%23faf4ee&quot;}">
<title>Übezeit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === FARBEN & VARIABLEN === */
:root {
  /* Basis – wärmer, weicher als v2 */
  --bg: #faf4ee;
  --surface: #ffffff;
  --surface2: #f0e9df;
  --border: #e4d9cc;
  --text: #2a2320;
  --muted: #8a7e74;

  /* Akzente – weniger aggressiv */
  --accent: #c76a4a;       /* Terrakotta – Hauptfarbe */
  --accent-soft: #e9d0c0;  /* Heller Akzent für Hintergründe */
  --accent2: #2a9d8f;      /* Teal – Tempo, Üben */
  --accent3: #a4546e;      /* Mauve – Spielen */
  --accent4: #b07d3a;      /* Gold – Sterne */

  /* Fortschritt – sanfter Verlauf statt hart grün/rot */
  --progress: #2a9d8f;     /* Fortschritt */
  --progress-soft: #b8ddd7; /* Heller Fortschritt */
  --done: #5daa68;         /* Erledigt – sanftes Grün */

  /* Layout */
  --nav-h: 58px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --radius: 14px;
  --shadow: 0 2px 14px rgba(88, 52, 28, 0.06);
}

/* === RESET === */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; overflow-x: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
  min-height: 100dvh;
  -webkit-overflow-scrolling: touch;
}

/* === APP CONTAINER === */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 16px 20px;
}

/* === TYPOGRAFIE === */
h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  color: var(--text);
  letter-spacing: -0.3px;
  font-weight: 400;
}
h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.15rem;
  color: var(--text);
  font-weight: 400;
}
.sub { color: var(--muted); font-size: 0.72rem; margin-top: 2px; }
.stitle {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 8px;
}
.shdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

/* === NAVIGATION (Fixed Bottom) === */
.nav {
  display: flex;
  background: var(--surface);
  padding: 6px 8px calc(6px + var(--safe-b));
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 16px rgba(88, 52, 28, 0.05);
}
.nav button {
  flex: 1;
  padding: 8px 4px 6px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: color 0.2s;
  min-height: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.nav button.on { color: var(--accent); }
.nav-icon { font-size: 18px; line-height: 1; }

/* === KARTEN === */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}

/* === LAYOUT HELPERS === */
.row { display: flex; gap: 8px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 6px; }
.flex1 { flex: 1; min-width: 0; }
.mb8 { margin-bottom: 8px; }
.mb12 { margin-bottom: 12px; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }

/* === BUTTONS === */
.btn {
  padding: 14px 16px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  width: 100%;
  text-align: center;
  min-height: 44px;
  -webkit-appearance: none;
}
.btn:active { transform: scale(0.97); opacity: 0.9; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-go { background: var(--accent2); color: #fff; }
.btn-soft { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-stop { background: #c0392b; color: #fff; }
.btn-sm { padding: 8px 14px; font-size: 13px; width: auto; min-height: 36px; }
.btn-xs { padding: 6px 12px; font-size: 11px; width: auto; min-height: 32px; }

/* === INPUTS === */
input[type="text"], input[type="number"], input[type="password"], input[type="date"], select, textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface);
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}

/* === STAT KACHELN === */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.stat {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat b {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  color: var(--accent);
  display: block;
}
.stat span {
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* === FORTSCHRITTSBALKEN === */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--progress);
  transition: width 0.4s;
}

/* === STÜCKE === */
.piece {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: box-shadow 0.2s;
  box-shadow: var(--shadow);
}
.piece:active { box-shadow: 0 1px 4px rgba(88, 52, 28, 0.1); }
.piece-name { font-weight: 600; font-size: 14px; }
.piece-cat { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

/* === TIMER === */
.timer-big {
  font-family: 'DM Serif Display', serif;
  font-size: 64px;
  color: var(--text);
  line-height: 1;
  letter-spacing: -2px;
}

/* === TEMPO === */
.tempo-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-appearance: none;
  box-shadow: var(--shadow);
}
.tempo-btn:active { background: var(--surface2); transform: scale(0.95); }

/* === STERNE === */
.star {
  border: none;
  background: none;
  font-size: 28px;
  cursor: pointer;
  padding: 4px;
  color: var(--border);
  transition: color 0.15s;
}
.star.on { color: var(--accent4); }

/* === BADGE === */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  vertical-align: middle;
}
.badge-ueben { background: var(--accent2); color: #fff; }
.badge-spielen { background: var(--accent3); color: #fff; }
.badge-done { background: var(--done); color: #fff; }
.badge-soft { background: var(--surface2); color: var(--muted); }

/* === VIEWS === */
.view { display: none; }
.view.on { display: block; }

/* === REMOVE BUTTON === */
.rm-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rm-btn:active { background: var(--surface2); }

/* === ADD BUTTON === */
.add-btn {
  width: 100%;
  padding: 10px;
  border: 2px dashed var(--border);
  border-radius: 10px;
  background: none;
  color: var(--accent2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

/* === LOG === */
.log-entry {
  padding: 12px;
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}

/* === ROUNDS === */
.rounds { margin-top: 10px; text-align: left; }
.round-item { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.round-item:last-child { border: none; }

/* === REWARD CARD === */
.reward-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border-left: 4px solid var(--accent4);
  box-shadow: var(--shadow);
}

/* === CELEBRATION === */
.celebration {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* === EMPTY STATE === */
.empty {
  text-align: center;
  color: var(--muted);
  padding: 24px;
  font-size: 13px;
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px">
    <div>
      <h1>🎸 Übezeit</h1>
      <div class="sub">Akustik · Fingerpicking</div>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="on" onclick="nav('home')"><span class="nav-icon">🎸</span>Üben</button>
    <button onclick="nav('lesson')"><span class="nav-icon">🎓</span>Unterricht</button>
    <button onclick="nav('stats')"><span class="nav-icon">📈</span>Fortschritt</button>
    <button onclick="nav('log')"><span class="nav-icon">📝</span>Tagebuch</button>
  </div>

  <!-- VIEWS -->
  <div class="view on" id="v-home">
    <div class="card" style="text-align:center;padding:20px;margin-top:20px">
      <div style="font-size:28px;margin-bottom:8px">⏳</div>
      <div style="font-size:14px;color:var(--muted)">Laden...</div>
      <button class="btn btn-soft mt12" onclick="try{localStorage.clear();}catch(x){}location.reload()">Falls leer: Hier tippen zum Reset</button>
    </div>
  </div>
  <div class="view" id="v-lesson"></div>
  <div class="view" id="v-stats"></div>
  <div class="view" id="v-log"></div>
  <div class="view" id="v-detail"></div>
  <div class="view" id="v-practice"></div>
  <div class="view" id="v-settings"></div>

</div>

<script>
// === ÜBEZEIT v3.0 ===

// Polyfill
if(typeof structuredClone==='undefined'){window.structuredClone=function(o){return JSON.parse(JSON.stringify(o));};}

// === FOKUS-KATEGORIEN (vordefiniert) ===
var FOCUS_OPTIONS=[
  {key:'sauberkeit',label:'Sauberkeit',type:'stars',mode:'ueben'},
  {key:'langsam',label:'Langsam genug',type:'stars',mode:'ueben'},
  {key:'ausdruck',label:'Ausdruck',type:'stars',mode:'spielen'},
  {key:'flow',label:'Im Fluss',type:'stars',mode:'spielen'},
  {key:'kraft',label:'Kraft / Ausdauer',type:'stars',mode:'ueben'},
  {key:'gleichmaessig',label:'Gleichmäßigkeit',type:'stars',mode:'ueben'},
  {key:'fehlerfrei',label:'Fehlerfrei',type:'yesno',mode:'spielen'}
];

// === DEFAULT STÜCKE ===
var DEF_PIECES=[
  {id:1,name:"Erstes Stück",cat:"Fingerstyle",note:"",status:"aktiv",links:[],sections:[{id:1,name:"1-Ende",mode:"ueben",startBpm:60,targetBpm:80,focus:["sauberkeit"]}]}
];

// === DEFAULT KATEGORIEN ===
var DEF_CATS=["Fingerstyle","Fingerstyle Klassik","Picking","Song","Aufwärmen"];
var CAT_COLORS=["#c76a4a","#2a9d8f","#a4546e","#b07d3a","#6b8193","#7c9070","#c9a84c"];

// === DATEN LADEN ===
var CATS,pieces,sessions,tempoHist,settings,rewards,lesson,analysisCache;
try{
  CATS=JSON.parse(localStorage.getItem("uz-cats"))||[].concat(DEF_CATS);
  pieces=JSON.parse(localStorage.getItem("uz-pieces"))||structuredClone(DEF_PIECES);
  sessions=JSON.parse(localStorage.getItem("uz-sessions"))||[];
  tempoHist=JSON.parse(localStorage.getItem("uz-tempo"))||{};
  settings=JSON.parse(localStorage.getItem("uz-settings"))||{weeklyMin:300,days:[1,2,3,4,5],name:'',apiKey:'',sessionMin:45};
  rewards=JSON.parse(localStorage.getItem("uz-rewards"))||{tiers:{bronze:{reward:'',unlocked:false,celebrated:false},silver:{reward:'',unlocked:false,celebrated:false},gold:{reward:'',unlocked:false,celebrated:false},diamond:{reward:'',unlocked:false,celebrated:false}}};
  lesson=JSON.parse(localStorage.getItem("uz-lesson"))||{nextDate:null,lastLessonDate:null,questions:[],feedback:'',planMinutes:30};
  analysisCache=JSON.parse(localStorage.getItem("uz-analysis")||'{}');
}catch(e){
  CATS=[].concat(DEF_CATS);
  pieces=structuredClone(DEF_PIECES);
  sessions=[];tempoHist={};
  settings={weeklyMin:300,days:[1,2,3,4,5],name:'',apiKey:'',sessionMin:45};
  rewards={tiers:{bronze:{reward:'',unlocked:false,celebrated:false},silver:{reward:'',unlocked:false,celebrated:false},gold:{reward:'',unlocked:false,celebrated:false},diamond:{reward:'',unlocked:false,celebrated:false}}};
  lesson={nextDate:null,lastLessonDate:null,questions:[],feedback:'',planMinutes:30};
  analysisCache={};
}
// Migration: settings defaults
if(!settings.sessionMin)settings.sessionMin=45;
if(!settings.weeklyMin)settings.weeklyMin=300;
if(!settings.days)settings.days=[1,2,3,4,5];

// Migration: alte Stücke ohne sections/status/focus
try{
  pieces=pieces.map(function(p){
    p.links=p.links||[];
    p.status=p.status||'aktiv';
    if(!p.sections||!p.sections.length){
      p.sections=[{id:1,name:p.note||'1-Ende',mode:'ueben',startBpm:p.startBpm||0,targetBpm:p.targetBpm||0,focus:['sauberkeit']}];
    }
    p.sections=p.sections.map(function(s){
      s.mode=s.mode||'ueben';
      s.focus=s.focus||['sauberkeit'];
      return s;
    });
    return p;
  });
}catch(e){pieces=structuredClone(DEF_PIECES);}

// === SAVE ===
function save(){
  try{
    localStorage.setItem("uz-pieces",JSON.stringify(pieces));
    localStorage.setItem("uz-sessions",JSON.stringify(sessions));
    localStorage.setItem("uz-tempo",JSON.stringify(tempoHist));
    localStorage.setItem("uz-settings",JSON.stringify(settings));
    localStorage.setItem("uz-cats",JSON.stringify(CATS));
    localStorage.setItem("uz-rewards",JSON.stringify(rewards));
    localStorage.setItem("uz-lesson",JSON.stringify(lesson));
  }catch(e){}
}

// === TEMPO HELPERS ===
function secKey(pName,sName){return pName+'::'+sName;}
function getLast(n){var h=tempoHist[n]||[];return h.length?h[h.length-1].bpm:0;}
function getHist(n){return tempoHist[n]||[];}
function getSecLast(pName,sName){return getLast(secKey(pName,sName))||getLast(pName);}
function getSecHist(pName,sName){var h=getHist(secKey(pName,sName));return h.length?h:getHist(pName);}

// === STREAK ===
function calcStreak(){
  if(!sessions.length)return 0;
  var days=new Set(sessions.map(function(s){return new Date(s.date).toDateString();}));
  var d=new Date();
  var streak=0;
  if(!days.has(d.toDateString()))d.setDate(d.getDate()-1);
  for(var i=0;i<365;i++){
    if(days.has(d.toDateString()))streak++;
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// === AUFTRITTSSICHER ===
function isPerformanceReady(pieceName){
  var recent=[];
  for(var i=sessions.length-1;i>=0;i--){
    (sessions[i].pieces||[]).forEach(function(sp){
      if(sp.name===pieceName&&sp.mode==='spielen'&&sp.errorFree!=null){
        recent.push(sp.errorFree);
      }
    });
  }
  if(recent.length<3)return {ready:false,streak:0,total:recent.length};
  var streak=0;
  for(var j=0;j<recent.length;j++){
    if(recent[j])streak++;else break;
  }
  return {ready:streak>=3,streak:streak,total:recent.length};
}
function countPerformanceReady(){
  var count=0;
  pieces.forEach(function(p){if(isPerformanceReady(p.name).ready)count++;});
  return count;
}

// State flags
var practicing=false;

// === NAV ===
var practiceReturnView=null; // remember which view to return to practice from

function nav(v){
  // If practicing and navigating away: pause, don't abort
  if(practicing&&v!=='practice'&&v!=='detail'){
    if(!practicePaused&&practiceStart){
      practicePaused=true;
      pauseStart=Date.now();
    }
    practiceReturnView=v;
  }
  // If navigating back to practice view
  if(v==='practice'&&practicing){
    practiceReturnView=null;
  }
  document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
  var el=document.getElementById("v-"+v);
  if(el)el.classList.add("on");
  // Tab highlighting (nur die 4 Haupt-Tabs)
  document.querySelectorAll(".nav button").forEach(function(b,i){
    b.classList.toggle("on",["home","lesson","stats","log"][i]===v);
  });
  // Render
  if(v==="home") renderHome();
  if(v==="lesson") renderLesson();
  if(v==="stats") renderStats();
  if(v==="log") renderLog();
  if(v==="settings") renderSettings();
}

// Navigate to detail view for a piece
function showDetail(id){
  document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
  document.getElementById("v-detail").classList.add("on");
  renderDetail(id);
}

// === HOME ===
function practiceBanner(){
  if(!practicing||!practiceStart)return '';
  var p=pieces.find(function(x){return x.id===practicePieceId;});
  var name=p?esc(p.name):'';
  return '<div onclick="nav(\'practice\')" style="cursor:pointer;padding:10px 14px;background:var(--accent2);color:#fff;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">'+
    '<div><div style="font-size:12px;font-weight:600">⏸ Üben pausiert</div>'+
    '<div style="font-size:11px;opacity:.85">'+name+' · '+fmt(practiceElapsed)+'</div></div>'+
    '<div style="font-size:14px;font-weight:700">▶ Weiter</div>'+
  '</div>';
}

function renderHome(){
  var el=document.getElementById("v-home");
  var hour=new Date().getHours();
  var name=settings.name?' '+esc(settings.name):'';
  var defaultGreeting=hour<12?'Guten Morgen'+name:hour<18?'Schön, dass du da bist'+name:'Noch ein paar Minuten Musik?';
  var greeting=settings.greeting||defaultGreeting;
  
  // Stats
  var todayStart=new Date();todayStart.setHours(0,0,0,0);
  var todayMin=sessions.filter(function(s){return new Date(s.date)>=todayStart;}).reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  // Add currently running practice
  if(practicing&&practiceStart)todayMin+=Math.round(practiceElapsed/60);
  var totalMin=sessions.reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  
  // Average rating (last 20 sessions)
  var allRatings=[];
  var recentSess=sessions.slice(-20);
  recentSess.forEach(function(s){
    (s.pieces||[]).forEach(function(sp){
      if(sp.techRating)allRatings.push(sp.techRating);
      if(sp.exprRating)allRatings.push(sp.exprRating);
      if(sp.flowRating)allRatings.push(sp.flowRating);
    });
  });
  var avgRating=allRatings.length?Math.round(allRatings.reduce(function(a,r){return a+r;},0)/allRatings.length*10)/10:0;
  var avgStars='';
  if(avgRating>0){
    var full=Math.floor(avgRating);
    var half=avgRating-full>=0.3;
    for(var si=0;si<5;si++){
      if(si<full)avgStars+='★';
      else if(si===full&&half)avgStars+='½';
      else avgStars+='☆';
    }
  }
  var avgHtml=avgRating>0?'<div class="stat"><b style="font-size:16px;letter-spacing:1px;color:var(--accent4)">'+avgStars+'</b><span>Ø Bewertung</span></div>':'<div class="stat"><b>–</b><span>Ø Bewertung</span></div>';
  
  // Week
  var weekStart=getMonday();
  var weekMin=sessions.filter(function(s){return new Date(s.date)>=weekStart;}).reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  var weekPct=Math.min(100,Math.round(weekMin/settings.weeklyMin*100));
  
  // Sort pieces: hausaufgabe first, then aktiv, ruhend hidden

function pieceCard(p){
  var secs=p.sections||[];
  var pr=isPerformanceReady(p.name);
  
  // Last practiced
  var lastSess=sessions.filter(function(s){return(s.pieces||[]).some(function(sp){return sp.name===p.name;});});
  var daysSince=lastSess.length?Math.floor((Date.now()-new Date(lastSess[lastSess.length-1].date).getTime())/86400000):999;
  var lastText=daysSince===0?'Heute':daysSince===1?'Gestern':daysSince<999?'Vor '+daysSince+' Tagen':'';
  
  // Worst section progress
  var worstInfo=null;
  secs.forEach(function(s){
    if(!s.targetBpm)return;
    var last=getSecLast(p.name,s.name);
    var pct=last?Math.round(last/s.targetBpm*100):0;
    if(pct<100&&(!worstInfo||pct<worstInfo.pct))worstInfo={name:s.name,cur:last||0,tgt:s.targetBpm,pct:pct};
  });
  
  var badges='';
  if(pr.ready)badges+=' <span class="badge badge-done">Auftrittssicher</span>';
  else if(pr.total>0)badges+=' <span class="badge badge-soft">'+pr.streak+'/3</span>';
  if(p.status==='hausaufgabe')badges+=' <span class="badge" style="background:var(--accent-soft);color:var(--accent)">Hausaufgabe</span>';
  
  var infoText='';
  if(lastText)infoText+=lastText;
  if(worstInfo)infoText+=(infoText?' · ':'')+worstInfo.name+' '+worstInfo.cur+'/'+worstInfo.tgt;
  
  var catIdx=CATS.indexOf(p.cat);
  var catCol=CAT_COLORS[catIdx>=0?catIdx%CAT_COLORS.length:0];
  
  return '<div class="piece" onclick="showDetail('+p.id+')" style="border-left:4px solid '+catCol+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center"><div>'+
      '<div class="piece-name">'+esc(p.name)+badges+'</div>'+
      '<div class="piece-cat" style="color:'+catCol+'">'+esc(p.cat)+(secs.length>1?' · '+secs.length+' Takte':'')+'</div>'+
    '</div><span style="font-size:14px;color:var(--muted)">→</span></div>'+
    (infoText?'<div style="font-size:11px;color:var(--muted);margin-top:4px">'+infoText+'</div>':'')+
  '</div>';
}

// === COMBINED TEMPO CHART ===
function buildCombinedTempoChart(p){
  var secs=(p.sections||[]).filter(function(s){return s.targetBpm;});
  var lineColors=['#2a9d8f','#c76a4a','#a4546e','#b07d3a','#6b8193','#7c9070'];
  var hasData=false;
  var allData=[];
  
  secs.forEach(function(s,si){
    var hist=getSecHist(p.name,s.name);
    if(hist.length>=2){hasData=true;}
    allData.push({name:s.name,target:s.targetBpm,hist:hist.slice(-20),color:lineColors[si%lineColors.length]});
  });
  if(!hasData)return '';
  
  // Find global min/max across all sections
  var globalMin=999,globalMax=0;
  allData.forEach(function(d){
    if(d.target>globalMax)globalMax=d.target;
    d.hist.forEach(function(h){
      if(h.bpm<globalMin)globalMin=h.bpm;
      if(h.bpm>globalMax)globalMax=h.bpm;
    });
  });
  var range=Math.max(globalMax-globalMin,10);
  globalMin=Math.max(0,globalMin-5);
  globalMax+=5;
  range=globalMax-globalMin;
  
  var w=320,h=140,pad=25;
  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block">';
  
  // Draw target lines (dashed)
  var drawnTargets={};
  allData.forEach(function(d){
    if(!d.target||drawnTargets[d.target])return;
    drawnTargets[d.target]=true;
    var ty=pad+(1-(d.target-globalMin)/range)*(h-pad*2);
    svg+='<line x1="'+pad+'" y1="'+ty+'" x2="'+(w-pad)+'" y2="'+ty+'" stroke="var(--muted)" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>';
    svg+='<text x="'+(w-pad+2)+'" y="'+(ty+3)+'" font-size="8" fill="var(--muted)" font-family="DM Sans">'+d.target+'</text>';
  });
  
  // Draw lines for each section
  allData.forEach(function(d){
    if(d.hist.length<2)return;
    var stepX=(w-pad*2)/(d.hist.length-1);
    
    // Line
    var pts=d.hist.map(function(h,i){
      var x=pad+i*stepX;
      var y=pad+(1-(h.bpm-globalMin)/range)*(h-pad*2);
      return x+','+y;
    });
    // Fix: recalculate y properly
    pts=d.hist.map(function(pt,i){
      var x=pad+i*stepX;
      var y=pad+(1-(pt.bpm-globalMin)/range)*(h-pad*2);
      return x+','+y;
    });
    svg+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+d.color+'" stroke-width="2" stroke-linejoin="round" opacity="0.85"/>';
    
    // Last value dot + label
    var lastPt=d.hist[d.hist.length-1];
    var lastX=pad+(d.hist.length-1)*stepX;
    var lastY=pad+(1-(lastPt.bpm-globalMin)/range)*(h-pad*2);
    svg+='<circle cx="'+lastX+'" cy="'+lastY+'" r="3" fill="'+d.color+'"/>';
    svg+='<text x="'+lastX+'" y="'+(lastY-6)+'" font-size="9" fill="'+d.color+'" text-anchor="middle" font-weight="600" font-family="DM Sans">'+lastPt.bpm+'</text>';
  });
  
  // Date labels from longest series
  var longest=allData.reduce(function(a,d){return d.hist.length>a.hist.length?d:a;},{hist:[]});
  if(longest.hist.length>=2){
    svg+='<text x="'+pad+'" y="'+(h-2)+'" font-size="8" fill="var(--muted)" font-family="DM Sans">'+new Date(longest.hist[0].date).toLocaleDateString('de-DE',{day:'numeric',month:'short'})+'</text>';
    svg+='<text x="'+(w-pad)+'" y="'+(h-2)+'" font-size="8" fill="var(--muted)" text-anchor="end" font-family="DM Sans">'+new Date(longest.hist[longest.hist.length-1].date).toLocaleDateString('de-DE',{day:'numeric',month:'short'})+'</text>';
  }
  
  svg+='</svg>';
  
  // Legend
  var legend=allData.filter(function(d){return d.hist.length>=2;}).map(function(d){
    return '<span style="font-size:10px;color:'+d.color+'">● '+esc(d.name)+'</span>';
  }).join(' ');
  
  return '<div class="card" style="padding:10px">'+svg+'<div style="display:flex;gap:8px;justify-content:center;margin-top:4px;flex-wrap:wrap">'+legend+'</div></div>';
}

// === SINGLE TEMPO CHART (kept for compatibility) ===
function buildTempoChart(pName,sName,targetBpm,hist){
  if(!hist||hist.length<2)return '';
  var w=320,h=100,pad=20;
  var maxBpm=Math.max(targetBpm||0,Math.max.apply(null,hist.map(function(h){return h.bpm;})));
  var minBpm=Math.min.apply(null,hist.map(function(h){return h.bpm;}));
  var range=Math.max(maxBpm-minBpm,10);
  var last20=hist.slice(-20);
  var stepX=(w-pad*2)/(last20.length-1);
  
  var points=last20.map(function(h,i){
    var x=pad+i*stepX;
    var y=pad+(1-(h.bpm-minBpm)/range)*(h-pad*2);
    return x+','+y;
  });
  // Fix y calculation
  points=last20.map(function(pt,i){
    var x=pad+i*stepX;
    var y=pad+(1-(pt.bpm-minBpm)/range)*(h-pad*2);
    return x+','+y;
  });
  
  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block">';
  // Target line
  if(targetBpm){
    var ty=pad+(1-(targetBpm-minBpm)/range)*(h-pad*2);
    svg+='<line x1="'+pad+'" y1="'+ty+'" x2="'+(w-pad)+'" y2="'+ty+'" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>';
    svg+='<text x="'+(w-pad+2)+'" y="'+(ty+3)+'" font-size="8" fill="var(--accent)" font-family="DM Sans">'+targetBpm+'</text>';
  }
  // Line
  svg+='<polyline points="'+points.join(' ')+'" fill="none" stroke="var(--accent2)" stroke-width="2" stroke-linejoin="round"/>';
  // Dots
  last20.forEach(function(pt,i){
    var x=pad+i*stepX;
    var y=pad+(1-(pt.bpm-minBpm)/range)*(h-pad*2);
    svg+='<circle cx="'+x+'" cy="'+y+'" r="3" fill="var(--accent2)"/>';
  });
  // Last value
  var lastPt=last20[last20.length-1];
  var lastY=pad+(1-(lastPt.bpm-minBpm)/range)*(h-pad*2);
  svg+='<text x="'+(pad+(last20.length-1)*stepX)+'" y="'+(lastY-8)+'" font-size="10" fill="var(--accent2)" text-anchor="middle" font-weight="600" font-family="DM Sans">'+lastPt.bpm+'</text>';
  // Date labels
  svg+='<text x="'+pad+'" y="'+(h-2)+'" font-size="8" fill="var(--muted)" font-family="DM Sans">'+new Date(last20[0].date).toLocaleDateString('de-DE',{day:'numeric',month:'short'})+'</text>';
  svg+='<text x="'+(w-pad)+'" y="'+(h-2)+'" font-size="8" fill="var(--muted)" text-anchor="end" font-family="DM Sans">'+new Date(lastPt.date).toLocaleDateString('de-DE',{day:'numeric',month:'short'})+'</text>';
  svg+='</svg>';
  
  return '<div class="card" style="padding:10px"><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+esc(sName)+'</div>'+svg+'</div>';
}

// === RATING HISTORY ===
function buildPieceRatingHistory(p){
  var entries=[];
  sessions.forEach(function(s){
    (s.pieces||[]).forEach(function(sp){
      if(sp.name===p.name&&(sp.techRating||sp.exprRating||sp.flowRating)){
        entries.push({date:s.date,tech:sp.techRating||0,expr:sp.exprRating||0,flow:sp.flowRating||0});
      }
    });
  });
  if(entries.length<2)return '';
  
  var last20=entries.slice(-20);
  var w=320,h=80,pad=20;
  var stepX=(w-pad*2)/(last20.length-1);
  
  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block">';
  
  // Draw lines for each rating type
  var types=[{key:'tech',color:'var(--accent2)',label:'Sauberkeit'},{key:'expr',color:'var(--accent3)',label:'Ausdruck'},{key:'flow',color:'var(--accent4)',label:'Flow'}];
  types.forEach(function(t){
    var hasData=last20.some(function(e){return e[t.key]>0;});
    if(!hasData)return;
    var pts=last20.map(function(e,i){
      var x=pad+i*stepX;
      var y=pad+(1-e[t.key]/5)*(h-pad*2);
      return x+','+y;
    }).join(' ');
    svg+='<polyline points="'+pts+'" fill="none" stroke="'+t.color+'" stroke-width="1.5" stroke-linejoin="round" opacity="0.8"/>';
  });
  svg+='</svg>';
  
  // Legend
  var legend=types.filter(function(t){return last20.some(function(e){return e[t.key]>0;});}).map(function(t){
    return '<span style="font-size:10px;color:'+t.color+'">● '+t.label+'</span>';
  }).join(' ');
  
  return '<div class="stitle mt12">Bewertungen</div><div class="card" style="padding:10px">'+svg+'<div style="display:flex;gap:8px;justify-content:center;margin-top:4px">'+legend+'</div></div>';
}

// === RECENT ENTRIES FOR PIECE ===
function buildRecentEntries(pName){
  var entries=[];
  sessions.forEach(function(s,si){
    (s.pieces||[]).forEach(function(sp){
      if(sp.name===pName)entries.push({date:s.date,section:sp.section,mode:sp.mode,totalSec:sp.totalSec,techRating:sp.techRating,exprRating:sp.exprRating,errorFree:sp.errorFree,note:sp.note});
    });
  });
  if(!entries.length)return '';
  
  var last5=entries.slice(-5).reverse();
  var html='<div class="stitle mt12">Letzte Einträge</div>';
  last5.forEach(function(e){
    var d=new Date(e.date);
    var dateStr=d.toLocaleDateString('de-DE',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    var mins=Math.round((e.totalSec||0)/60);
    var badge=e.mode==='spielen'?'<span class="badge badge-spielen">🎭</span>':'<span class="badge badge-ueben">🔧</span>';
    var ratHtml='';
    if(e.techRating)ratHtml+='<span style="color:var(--accent4)">'+'★'.repeat(e.techRating)+'</span> ';
    if(e.errorFree===true)ratHtml+='<span style="color:var(--done)">✅</span> ';
    
    html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">'+
      '<div>'+badge+' '+(e.section?esc(e.section):'')+' <span style="color:var(--muted)">'+dateStr+'</span>'+
        (ratHtml?' '+ratHtml:'')+
        (e.note?' <span style="font-style:italic;color:var(--muted)">'+esc(e.note)+'</span>':'')+
      '</div>'+
      '<span style="font-weight:600;color:var(--accent)">'+mins+'\'</span>'+
    '</div>';
  });
  return '<div class="card" style="padding:10px">'+html+'</div>';
}

  if(!p)return;
  var btn=document.getElementById('ai-btn-'+id);
  var result=document.getElementById('ai-result-'+id);
  if(!settings.apiKey){

function savePieceFields(id){
  var p=pieces.find(function(x){return x.id===id;});
  if(!p)return;
  // Read piece-level fields
  document.querySelectorAll('[data-piece="'+id+'"][data-field]').forEach(function(el){
    var f=el.dataset.field;
    if(el.dataset.sec!==undefined){
      var si=parseInt(el.dataset.sec);
      if(p.sections[si]){
        if(f==='startBpm'||f==='targetBpm')p.sections[si][f]=parseInt(el.value)||0;
        else p.sections[si][f]=el.value;
      }
    }else if(el.dataset.link!==undefined){
      var li=parseInt(el.dataset.link);
      if(p.links[li])p.links[li][f]=el.value;
    }else{
      p[f]=el.tagName==='SELECT'?el.value:el.value;
    }
  });
  save();
}

function setSectionMode(pid,si,mode){
  savePieceFields(pid);
  var p=pieces.find(function(x){return x.id===pid;});
  if(p&&p.sections[si]){
    var oldMode=p.sections[si].mode;
    if(oldMode!==mode){
      // Save current focus state for old mode
      if(!p.sections[si].focusPerMode)p.sections[si].focusPerMode={};
      p.sections[si].focusPerMode[oldMode]=[].concat(p.sections[si].focus||[]);
      
      // Restore saved focus for new mode, or use defaults
      if(p.sections[si].focusPerMode[mode]){
        p.sections[si].focus=[].concat(p.sections[si].focusPerMode[mode]);
      }else{
        var defaults=FOCUS_OPTIONS.filter(function(fo){return fo.mode===mode;}).map(function(fo){return fo.key;});
        var customEntries=(p.sections[si].customFocus||[]).map(function(cf){return typeof cf==='object'?cf:{key:cf,mode:mode};});
        var modeCustomKeys=customEntries.filter(function(cf){return cf.mode===mode;}).map(function(cf){return cf.key;});
        p.sections[si].focus=defaults.concat(modeCustomKeys);
      }
    }
    p.sections[si].mode=mode;
    save();editPiece(pid);
  }
}

function toggleSectionFocus(pid,si,key){
  savePieceFields(pid);
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p||!p.sections[si])return;
  var f=p.sections[si].focus||[];
  var idx=f.indexOf(key);
  if(idx>=0)f.splice(idx,1);else f.push(key);
  // Ensure at least one focus
  if(!f.length){
    var mode=p.sections[si].mode||'ueben';
    f.push(mode==='spielen'?'ausdruck':'sauberkeit');
  }
  p.sections[si].focus=f;
  save();editPiece(pid);
}

function addCustomFocus(pid,si){
  var input=document.getElementById('custom-focus-'+pid+'-'+si);
  if(!input||!input.value.trim())return;
  savePieceFields(pid);
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p||!p.sections[si])return;
  var key=input.value.trim();
  var mode=p.sections[si].mode||'ueben';
  if(!p.sections[si].customFocus)p.sections[si].customFocus=[];
  var exists=p.sections[si].customFocus.some(function(cf){var k=typeof cf==='object'?cf.key:cf;return k===key;});
  if(!exists)p.sections[si].customFocus.push({key:key,mode:mode});
  if(p.sections[si].focus.indexOf(key)<0)p.sections[si].focus.push(key);
  save();
  editPiece(pid);
}

function removeCustomFocus(pid,si,key){
  savePieceFields(pid);
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p||!p.sections[si])return;
  var f=p.sections[si].focus||[];
  var idx=f.indexOf(key);
  if(idx>=0)f.splice(idx,1);
  var cf=p.sections[si].customFocus||[];
  p.sections[si].customFocus=cf.filter(function(c){var k=typeof c==='object'?c.key:c;return k!==key;});
  save();
  editPiece(pid);
}

function addSection(pid){
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p)return;
  var maxId=(p.sections||[]).reduce(function(a,s){return Math.max(a,s.id||0);},0);
  p.sections.push({id:maxId+1,name:'Neue Takte',mode:'ueben',startBpm:0,targetBpm:0,focus:['sauberkeit']});
  save();editPiece(pid);
}

function delSection(pid,si){
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p||p.sections.length<=1)return;
  savePieceFields(pid);
  p.sections.splice(si,1);
  save();editPiece(pid);
}

function addLink(pid,type){
  var p=pieces.find(function(x){return x.id===pid;});
  if(p){p.links.push({label:'',url:'',type:type});save();editPiece(pid);}
}

function removeLink(pid,li){
  var p=pieces.find(function(x){return x.id===pid;});
  if(p){p.links.splice(li,1);save();editPiece(pid);}
}

function delPiece(id){
  pieces=pieces.filter(function(x){return x.id!==id;});
  save();nav('home');
}

function startPracticeFromDetail(pid,si){
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p)return;
  var sec=p.sections[si];if(!sec)return;
  
  practicePieceId=pid;
  practiceSectionIdx=si;
  practiceMode=sec.mode||'ueben';
  practiceElapsed=0;
  practicePaused=false;pauseStart=null;totalPausedMs=0;
  practiceStart=null;
  rounds=[];roundStart=null;
  practicing=true;
  // Reset session timer only if not in a plan session
  if(!planActive)sessionTotalElapsed=0;
  
  if(practiceMode==='ueben'){
    currentTempo=sec.startBpm||getSecLast(p.name,sec.name)||sec.targetBpm||80;
  }
  
  document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
  document.getElementById("v-practice").classList.add("on");
  renderPractice();
}

function startPracticeTimer(){
  if(practiceStart)return;
  practiceStart=Date.now();
  roundStart=Date.now();
  practiceTimer=setInterval(function(){
    if(!practicePaused){
      practiceElapsed=Math.round((Date.now()-practiceStart-totalPausedMs)/1000);
      sessionTotalElapsed++;
      updatePracticeTimer();
      // Check plan countdown
      if(planActive)checkPlanCountdown();
      // Check if session time is up (only when not in plan mode)
      if(!planActive){
        var totalSec=(settings.sessionMin||45)*60;
        if(sessionTotalElapsed>=totalSec&&sessionTotalElapsed-1<totalSec){
          showTimeUp();
        }
      }
    }
  },1000);
  renderPractice();
}

function updatePracticeTimer(){
  var el=document.getElementById("p-timer");if(el)el.textContent=fmtCountdown();
  var sub=document.getElementById("p-timer-sub");if(sub)sub.innerHTML=fmtTimerSub(true);
  // Check if session time is up
  var totalSec=(settings.sessionMin||45)*60;
  if(sessionTotalElapsed>=totalSec&&sessionTotalElapsed-1<totalSec){
    showTimeUp();
  }
}

function fmtCountdown(){
  if(planActive){
    var remaining=getPlanCountdown();
    if(remaining<=0)return '0:00';
    return fmt(remaining);
  }
  var totalSec=(settings.sessionMin||45)*60;
  var remaining=totalSec-sessionTotalElapsed;
  if(remaining<=0)return '+'+fmt(Math.abs(remaining));
  return fmt(remaining);
}

function fmtTimerSub(isRunning){
  if(planActive&&isRunning){
    var item=planItems?planItems[planIndex]:null;
    var info=item?(planIndex+1)+'/'+planItems.length+' · '+fmt(practiceElapsed)+' geübt':'';
    return info;
  }
  if(!isRunning)return (settings.sessionMin||45)+' Min geplant';
  var totalSec=(settings.sessionMin||45)*60;
  var remaining=totalSec-sessionTotalElapsed;
  if(remaining<=0)return '<span style="color:var(--accent);font-weight:600">Zeit ist um · '+fmt(sessionTotalElapsed)+' geübt</span>';
  return fmt(sessionTotalElapsed)+' geübt';
}

function showTimeUp(){

function resumeAfterTimeUp(){

function togglePause(){

    roundStart=Date.now();
  }else{

  }

}

function adjTempo(d){
  var newT=Math.max(20,Math.min(300,currentTempo+d));
  if(newT!==currentTempo){
    if(roundStart){
      var roundSec=Math.round((Date.now()-roundStart)/1000);
      if(roundSec>0)rounds.push({bpm:currentTempo,seconds:roundSec});
      roundStart=Date.now();
    }
    currentTempo=newT;
    var el=document.getElementById("tempo-display");if(el)el.textContent=currentTempo;
    updateRoundsDisplay();
    if(metroOn){metroBpm=currentTempo;mStop();mStart();}
  }
}

function setTempoVal(v){currentTempo=v;var el=document.getElementById("tempo-display");if(el)el.textContent=v;if(metroOn){metroBpm=v;mStop();mStart();}}

function updateRoundsDisplay(){
  var el=document.getElementById("rounds-display");if(!el)return;
  if(!rounds.length){el.innerHTML='';return;}
  el.innerHTML='<div class="card" style="padding:10px"><div class="stitle">Tempo-Runden</div>'+rounds.map(function(r){
    return '<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--accent2);font-weight:600">'+r.bpm+' BPM</span><span style="color:var(--muted)">'+fmt(r.seconds)+'</span></div>';

}

function togglePracticeFocus(){
  var el=document.getElementById('practice-focus-edit');
  if(!el)return;
  if(el.innerHTML){el.innerHTML='';return;}
  
  var p=pieces.find(function(x){return x.id===practicePieceId;});
  if(!p)return;
  var sec=(p.sections||[])[practiceSectionIdx];
  if(!sec)return;
  var mode=sec.mode||'ueben';
  var focus=sec.focus||[];
  
  var html='<div class="card" style="padding:10px"><div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">';
  FOCUS_OPTIONS.filter(function(fo){return fo.mode===mode;}).forEach(function(fo){
    var active=focus.indexOf(fo.key)>=0;
    html+='<button class="btn btn-xs '+(active?'btn-go':'btn-soft')+'" onclick="togglePracticeFocusItem(\''+fo.key+'\')">'+fo.label+'</button>';
  });
  // Custom focus for this mode
  var predefined=FOCUS_OPTIONS.map(function(fo){return fo.key;});
  var customs=(sec.customFocus||[]).map(function(cf){return typeof cf==='object'?cf:{key:cf,mode:mode};}).filter(function(cf){return cf.mode===mode;});
  customs.forEach(function(cf){
    var active=focus.indexOf(cf.key)>=0;
    html+='<button class="btn btn-xs '+(active?'btn-go':'btn-soft')+'" onclick="togglePracticeFocusItem(\''+esc(cf.key).replace(/'/g,"\\'")+'\')">'+esc(cf.key)+'</button>';
  });

  el.innerHTML=html;
}

function togglePracticeFocusItem(key){
  var p=pieces.find(function(x){return x.id===practicePieceId;});
  if(!p)return;
  var sec=(p.sections||[])[practiceSectionIdx];
  if(!sec)return;
  var f=sec.focus||[];
  var idx=f.indexOf(key);
  if(idx>=0)f.splice(idx,1);else f.push(key);
  var mode=sec.mode||'ueben';
  if(!f.length)f.push(mode==='spielen'?'ausdruck':'sauberkeit');
  sec.focus=f;
  save();
  togglePracticeFocus();// re-render focus panel
  renderPractice();
}

// === STOP PRACTICE ===
function stopPractice(abort){
  clearInterval(practiceTimer);
  if(metroOn)mStop();
  var p=pieces.find(function(x){return x.id===practicePieceId;});
  var sec=p?(p.sections||[])[practiceSectionIdx]:null;
  
  if(!abort&&p&&(practiceStart||practiceMode==='spielen')){
    if(practiceMode!=='spielen'&&roundStart){
      var roundSec=Math.round((Date.now()-roundStart)/1000);
      if(roundSec>0)rounds.push({bpm:currentTempo,seconds:roundSec});
    }
    var totalSec=practiceElapsed;
    
    if(totalSec>0){
      // Save tempo
      if(practiceMode!=='spielen'&&sec&&rounds.length){
        var maxBpm=Math.max.apply(null,rounds.map(function(r){return r.bpm;}));
        var key=secKey(p.name,sec.name);
        if(!tempoHist[key])tempoHist[key]=[];
        tempoHist[key].push({date:new Date().toISOString(),bpm:maxBpm});
      }
      
      pendingEntry={
        pieceName:p.name,section:sec?sec.name:null,mode:practiceMode,
        rounds:practiceMode==='spielen'?[]:[].concat(rounds),
        totalSec:totalSec,ratings:{},errorFree:null,
        focus:sec?sec.focus:['sauberkeit']
      };
      save();
      practicing=false;practicePieceId=null;rounds=[];practiceStart=null;
      showRatingScreen();
      return;
    }
  }
  var lastPid=practicePieceId;
  practicing=false;practicePieceId=null;rounds=[];pendingEntry=null;practiceStart=null;
  if(lastPid)showDetail(lastPid);else nav('home');
}

function setEntryRating(key,val){
  if(!pendingEntry)return;
  pendingEntry.ratings[key]=val;
  showRatingScreen();
}

function setEntryErrorFree(val){
  if(!pendingEntry)return;
  pendingEntry.errorFree=val;
  showRatingScreen();
}

function saveEntry(skip){
  var pName=pendingEntry?pendingEntry.pieceName:null;
  if(pendingEntry){
    var entry={
      date:new Date().toISOString(),
      pieceName:pendingEntry.pieceName,
      section:pendingEntry.section,
      mode:pendingEntry.mode,
      totalSec:pendingEntry.totalSec,
      rounds:pendingEntry.rounds,
      ratings:skip?{}:pendingEntry.ratings,
      errorFree:skip?null:pendingEntry.errorFree
    };
    sessions.push({
      date:entry.date,
      totalSec:entry.totalSec,
      pieces:[{
        name:entry.pieceName,section:entry.section,mode:entry.mode,
        rounds:entry.rounds,totalSec:entry.totalSec,
        techRating:entry.ratings.sauberkeit||0,
        exprRating:entry.ratings.ausdruck||0,
        overallRating:entry.ratings.flow||0,
        flowRating:entry.ratings.flow||0,
        errorFree:entry.errorFree
      }]
    });
    pendingEntry=null;
    save();
    localStorage.removeItem("uz-pending");
  }
  // Navigate: if plan active, go to next piece
  if(planActive){
    startPlanPiece(planIndex+1);
    return;
  }
  var lastPiece=pName?pieces.find(function(x){return x.name===pName;}):null;
  if(lastPiece)showDetail(lastPiece.id);else nav('home');
}

function cancelRating(){
  // Go back without saving - discard the entry
  var pName=pendingEntry?pendingEntry.pieceName:null;
  pendingEntry=null;
  var lastPiece=pName?pieces.find(function(x){return x.name===pName;}):null;
  if(lastPiece)showDetail(lastPiece.id);else nav('home');
}

function togglePracticeMetro(){

  else{metroBpm=currentTempo;mStart();}

  if(btn){btn.textContent=metroOn?'Stop':'♩';btn.style.background=metroOn?'#c0392b':'var(--accent2)';}
}

function mClick(accent){
  if(!audioCtx)return;
  try{
    var o=audioCtx.createOscillator();var g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=accent?1000:700;g.gain.value=accent?0.4:0.2;
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.06);
    o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.06);
  }catch(e){}
}

function mStart(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}
  if(audioCtx.state==='suspended')audioCtx.resume();
  metroBt=0;metroOn=true;
  var interval=Math.round(60000/metroBpm);
  setTimeout(function(){
    mClick(true);
    metroInt=setInterval(function(){
      metroBt=(metroBt+1)%4;
      mClick(metroBt===0);
    },interval);
  },100);
}

function mStop(){clearInterval(metroInt);metroOn=false;metroBt=0;}

function updateLessonDate(dateStr){
  var cur=lesson.nextDate||'';
  var time=cur.length>=16?cur.substring(11,16):'12:00';
  lesson.nextDate=dateStr+'T'+time;
  save();renderLesson();
}

function updateLessonTime(timeStr){
  var cur=lesson.nextDate||'';
  var date=cur.length>=10?cur.substring(0,10):new Date().toISOString().substring(0,10);
  lesson.nextDate=date+'T'+timeStr;
  save();renderLesson();
}

function addQuestion(){
  var input=document.getElementById('new-question');
  if(!input||!input.value.trim())return;
  if(!lesson.questions)lesson.questions=[];
  lesson.questions.push({id:Date.now(),text:input.value.trim()});
  save();renderLesson();
}

function removeQuestion(qi){
  lesson.questions.splice(qi,1);
  save();renderLesson();
}

function toggleArchive(idx){
  var body=document.getElementById('archive-body-'+idx);
  var arrow=document.getElementById('archive-arrow-'+idx);
  if(!body)return;
  if(body.style.display==='none'){
    body.style.display='';
    if(arrow)arrow.textContent='▲';
  }else{
    body.style.display='none';
    if(arrow)arrow.textContent='▼';
  }
}

function confirmFinishLesson(){
  var hwPieces=pieces.filter(function(p){return p.status==='hausaufgabe';});
  if(!hwPieces.length){
    finishLesson();
    return;
  }
  
  // Show piece status selection screen
  var el=document.getElementById("v-lesson");
  var html='<button class="btn btn-xs btn-soft mb12" onclick="renderLesson()" style="width:auto">← Zurück</button>'+
    '<div class="stitle">Unterricht abschließen</div>'+
    '<div style="font-size:13px;color:var(--muted);margin-bottom:12px">Was passiert mit den Hausaufgaben?</div>';
  
  hwPieces.forEach(function(p){
    html+='<div class="card" style="padding:12px">'+
      '<div style="font-size:13px;font-weight:600;margin-bottom:8px">'+esc(p.name)+'</div>'+
      '<div style="display:flex;gap:6px">'+
        '<button class="btn btn-xs btn-primary" onclick="setFinishStatus('+p.id+',\'hausaufgabe\',this)" style="flex:1">Weiter üben</button>'+
        '<button class="btn btn-xs btn-soft" onclick="setFinishStatus('+p.id+',\'aktiv\',this)" style="flex:1">Fertig</button>'+
        '<button class="btn btn-xs btn-soft" onclick="setFinishStatus('+p.id+',\'ruhend\',this)" style="flex:1">Ruhend</button>'+
      '</div>'+
    '</div>';
  });
  
  html+='<button class="btn btn-go mt12" onclick="finishLesson()">Abschließen</button>';
  
  el.innerHTML=html;
}

function setFinishStatus(pid,status,btn){
  var p=pieces.find(function(x){return x.id===pid;});
  if(p)p.status=status;
  save();
  // Update button styles in parent
  var parent=btn.parentElement;
  if(parent){
    var btns=parent.querySelectorAll('button');
    btns.forEach(function(b,i){
      var s=['hausaufgabe','aktiv','ruhend'][i];
      if(s===status){b.className='btn btn-xs btn-primary';}
      else{b.className='btn btn-xs btn-soft';}
    });
  }
}

function finishLesson(){
  finishConfirmed=false;
  
  // Grab any unsaved question from input field
  var qInput=document.getElementById('new-question');
  if(qInput&&qInput.value.trim()){
    if(!lesson.questions)lesson.questions=[];
    lesson.questions.push({id:Date.now(),text:qInput.value.trim()});
  }
  
  // Archive this lesson
  var archive=[];
  try{archive=JSON.parse(localStorage.getItem('uz-lesson-archive'))||[];}catch(e){}
  
  // Gather stats since last lesson
  var sinceDate=lesson.lastLessonDate?new Date(lesson.lastLessonDate):null;
  var sinceSess=sinceDate?sessions.filter(function(s){return new Date(s.date)>=sinceDate;}):sessions;
  var sinceMins=sinceSess.reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  var sincePieces=[];
  sinceSess.forEach(function(s){(s.pieces||[]).forEach(function(sp){if(sincePieces.indexOf(sp.name)<0)sincePieces.push(sp.name);});});
  
  // Homework status
  var hwStatus=pieces.filter(function(p){return p.status==='hausaufgabe';}).map(function(p){
    var secs=(p.sections||[]);
    var done=secs.every(function(s){return !s.targetBpm||getSecLast(p.name,s.name)>=s.targetBpm;});
    return {name:p.name,done:done};
  });
  
  archive.unshift({
    date:new Date().toISOString(),
    feedback:lesson.feedback||'',
    questions:(lesson.questions||[]).map(function(q){return q.text;}),
    sessions:sinceSess.length,
    minutes:sinceMins,
    pieces:sincePieces,
    homework:hwStatus
  });
  
  // Keep max 50 entries
  if(archive.length>50)archive=archive.slice(0,50);
  try{localStorage.setItem('uz-lesson-archive',JSON.stringify(archive));}catch(e){}
  
  // Reset for next cycle
  lesson.lastLessonDate=new Date().toISOString();
  lesson.questions=[];
  lesson.feedback='';
  lesson.nextDate=null;
  save();renderLesson();
}

function generateUebeplan(){
  var minInput=document.getElementById('plan-minutes');
  var minutes=parseInt(minInput?minInput.value:settings.sessionMin)||45;
  var btn=document.getElementById('plan-btn');
  var result=document.getElementById('plan-result');
  
  if(!settings.apiKey){
    if(result)result.innerHTML='<div style="font-size:12px;color:var(--muted);margin-top:8px">API-Key fehlt. Trage ihn in den Einstellungen ein.</div>';
    return;
  }
  if(btn)btn.textContent='⏳ Erstelle Plan...';
  
  // Collect piece data with IDs
  var pData=pieces.filter(function(p){return p.status!=='ruhend';}).map(function(p){
    var secs=(p.sections||[]).map(function(s,si){
      return s.name+' (Index '+si+'): Ist '+getSecLast(p.name,s.name)+'/Ziel '+s.targetBpm+', Modus: '+s.mode;
    }).join(', ');
    return p.name+' (ID:'+p.id+', '+p.cat+', '+p.status+'): '+secs;
  }).join('\n');
  
  var weekStart=getMonday();
  var weekSess=sessions.filter(function(s){return new Date(s.date)>=weekStart;});
  var weekInfo=weekSess.length?weekSess.length+' Sessions, '+weekSess.reduce(function(a,s){return a+Math.round(s.totalSec/60);},0)+' Min diese Woche':'Noch nicht geübt diese Woche';
  
  var daysToLesson='';
  if(lesson.nextDate){
    var diff=Math.ceil((new Date(lesson.nextDate).setHours(0,0,0,0)-new Date().setHours(0,0,0,0))/86400000);
    if(diff>0)daysToLesson='Nächster Unterricht in '+diff+' Tagen.';
  }
  
  var prompt='Erstelle einen Gitarren-Übeplan. '+minutes+' Minuten Zeit. '+daysToLesson+' '+weekInfo+'\n\nStücke:\n'+pData+'\n\n'+
    'PRIORITÄTEN:\n'+
    '- Stücke mit Status "hausaufgabe" haben VORRANG: ca. 60-70% der Zeit\n'+
    '- Wenn keine Hausaufgaben vorhanden: Stücke priorisieren die am weitesten vom Zieltempo entfernt sind oder am längsten nicht geübt wurden\n'+
    '- Stücke mit Status "aktiv" bekommen den Rest, damit sie nicht einrosten\n'+
    '- Stücke weit vom Zieltempo brauchen mehr Zeit als solche die fast fertig sind\n'+
    '- Beginne mit etwas Leichtem zum Aufwärmen (5 Min)\n'+
    '- Schwieriges (weit vom Ziel) in die Mitte bei höchster Konzentration\n'+
    '- Am Ende ein Stück im Spielen-Modus durchspielen für Auftrittssicherheit\n'+
    '- Max 10-15 Min pro Abschnitt, dann wechseln\n\n'+
    'WICHTIG: Antworte AUSSCHLIESSLICH mit einem JSON-Array. Kein Text davor oder danach. Keine Markdown-Backticks. Nur das reine JSON-Array.\n\n'+
    'Format: [{"pieceId":1,"piece":"Stückname","sectionIdx":0,"section":"Takte 1-4","minutes":10,"bpm":60,"comment":"Kurzer Tipp auf Deutsch"}]\n\n'+
    'pieceId: Verwende die ID aus der Stücke-Liste oben. Wenn nicht vorhanden (z.B. Aufwärmen), setze pieceId auf 0.\n'+
    'Summe der Minuten = '+minutes+'. Maximal 6 Einträge. Comment: 3-6 Worte, motivierend.';
  
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':settings.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    var text=(data.content&&data.content[0])?data.content[0].text:'';
    // Try to parse as JSON
    var plan=null;
    try{
      var clean=text.replace(/```json|```/g,'').trim();
      plan=JSON.parse(clean);
    }catch(e){
      // Fallback: save as text
      plan=null;
    }
    var cached={date:new Date().toISOString(),plan:plan,text:plan?null:text};
    try{localStorage.setItem('uz-uebeplan',JSON.stringify(cached));}catch(e){}
    if(btn)btn.textContent='🤖 Übeplan erstellen';
    renderLesson();
    renderHome();
  }).catch(function(e){
    if(btn)btn.textContent='🤖 Übeplan erstellen';
    if(result)result.innerHTML='<div style="font-size:12px;color:var(--muted);margin-top:8px">Fehler: '+e.message+'</div>';
  });
}

function renderUebeplanCards(){
  var cached=null;
  try{cached=JSON.parse(localStorage.getItem('uz-uebeplan'));}catch(e){}
  if(!cached)return '';
  
  // Check if plan is from today
  var planDate=new Date(cached.date);
  var today=new Date();
  if(planDate.toDateString()!==today.toDateString())return '';
  
  var html='<div class="stitle mt12">🤖 KI-Übeplan</div>';
  
  if(cached.plan&&Array.isArray(cached.plan)&&cached.plan.length){
    var totalMin=cached.plan.reduce(function(a,item){return a+(item.minutes||0);},0);
    html='<div class="stitle mt12">🤖 KI-Übeplan <span style="font-weight:400;text-transform:none;letter-spacing:0">· '+totalMin+' Min</span></div>';
    
    // Check what was practiced today
    var todayStart=new Date();todayStart.setHours(0,0,0,0);
    var todaySessions=sessions.filter(function(s){return new Date(s.date)>=todayStart;});
    var practicedToday={};
    var practicedPieces={};
    todaySessions.forEach(function(s){
      (s.pieces||[]).forEach(function(sp){
        var key=sp.name+(sp.section?'::'+sp.section:'');
        practicedToday[key]=true;
        practicedPieces[sp.name]=true;
      });
    });
    
    var doneCount=0;
    cached.plan.forEach(function(item){
      var p=null;
      if(item.pieceId)p=pieces.find(function(x){return x.id===item.pieceId;});
      if(!p&&item.piece)p=pieces.find(function(x){return x.name===item.piece;});
      var canStart=p&&p.sections&&p.sections.length;
      var secIdx=item.sectionIdx||0;
      if(p&&item.section){
        var matchIdx=-1;
        (p.sections||[]).forEach(function(s,si){if(s.name===item.section)matchIdx=si;});
        if(matchIdx>=0)secIdx=matchIdx;
      }
      
      // Check if practiced today - exact match by piece+section
      var pKey=(item.piece||'')+(item.section?'::'+item.section:'');
      var done=practicedToday[pKey]||false;
      if(done)doneCount++;
      
      if(done){
        html+='<div class="card" style="padding:12px;display:flex;align-items:center;gap:10px;border-left:3px solid var(--done);opacity:.5">'+
          '<div style="flex:1">'+
            '<div style="font-size:13px;font-weight:600;text-decoration:line-through;color:var(--muted)">'+esc(item.piece||'')+(item.section?' · '+esc(item.section):'')+'</div>'+
            '<div style="font-size:11px;color:var(--done);margin-top:2px">✓ Geübt</div>'+
          '</div>'+
        '</div>';
      }else{
        html+='<div class="card" style="padding:12px;display:flex;align-items:center;gap:10px;border-left:3px solid var(--accent2)">'+
          '<div style="flex:1">'+
            '<div style="font-size:13px;font-weight:600">'+esc(item.piece||'')+(item.section?' · '+esc(item.section):'')+'</div>'+
            '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+
              (item.minutes?item.minutes+' Min':'')+(item.bpm?' · '+item.bpm+' BPM':'')+
            '</div>'+
            (item.comment?'<div style="font-size:11px;color:var(--accent);margin-top:2px;font-style:italic">'+esc(item.comment)+'</div>':'')+
          '</div>'+
          (canStart?'<button class="btn btn-xs btn-go" onclick="startFromPlan('+p.id+','+secIdx+')" style="width:auto;min-width:40px">▶</button>':'')+
        '</div>';
      }
    });
    
    // Update title with progress
    var planTotal=cached.plan.length;
    html=html.replace('🤖 KI-Übeplan','🤖 KI-Übeplan <span style="font-weight:400;text-transform:none;letter-spacing:0">· '+doneCount+'/'+planTotal+'</span>');
    
    // Add plan runner button if not all done
    if(doneCount<planTotal){
      html+='<button class="btn btn-go mt8" onclick="startPlanRunner()" style="font-size:15px">▶ Plan starten</button>';
    }
    
    return html;
  }
  
  // Fallback: text plan - only show in lesson tab, not on home
  return '';
}

// === PLAN RUNNER (Regisseur) ===
var planActive=false;
var planItems=null;
var planIndex=0;
var planPieceCountdown=0; // seconds remaining for current plan piece
var planWarningShown=false;

function startPlanRunner(){
  var cached=null;
  try{cached=JSON.parse(localStorage.getItem('uz-uebeplan'));}catch(e){}
  if(!cached||!cached.plan||!cached.plan.length)return;
  
  planItems=cached.plan;
  planIndex=0;
  planActive=true;
  startPlanPiece(0);
}

function startPlanPiece(idx){
  if(!planItems||idx>=planItems.length){
    // Plan complete
    planActive=false;
    planItems=null;
    nav('home');
    return;
  }
  planIndex=idx;
  planWarningShown=false;
  var item=planItems[idx];
  planPieceCountdown=(item.minutes||10)*60;
  
  // Find piece
  var p=null;
  if(item.pieceId)p=pieces.find(function(x){return x.id===item.pieceId;});
  if(!p&&item.piece)p=pieces.find(function(x){return x.name===item.piece;});
  
  if(p){
    var secIdx=item.sectionIdx||0;
    if(item.section){
      (p.sections||[]).forEach(function(s,si){if(s.name===item.section)secIdx=si;});
    }
    // Set tempo from plan
    if(item.bpm)currentTempo=item.bpm;
    startPracticeFromDetail(p.id,secIdx);
  }else{
    // Unknown piece (e.g. Aufwärmen) - start prime time with countdown
    startPrimeTimeWithPlan(item);
  }
}

function startPrimeTimeWithPlan(item){
  practicePieceId=null;
  practiceSectionIdx=0;
  practiceMode='primetime';
  practiceElapsed=0;
  practicePaused=false;pauseStart=null;totalPausedMs=0;
  practiceStart=null;
  rounds=[];roundStart=null;
  practicing=true;
  planPieceCountdown=(item.minutes||10)*60;
  planWarningShown=false;
  
  document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
  document.getElementById("v-practice").classList.add("on");
  renderPrimeTime();
}

function getPlanCountdown(){
  return Math.max(0,planPieceCountdown-practiceElapsed);
}

function checkPlanCountdown(){
  if(!planActive)return;
  var remaining=getPlanCountdown();
  
  // 1 minute warning
  if(remaining<=60&&remaining>59&&!planWarningShown){
    planWarningShown=true;
    showPlanWarning();
  }
  
  // Time up for this piece
  if(remaining<=0&&!planWarningShown){
    planWarningShown=true;
  }
  if(remaining<=0&&remaining>-1){
    showPlanItemDone();
  }
}

function showPlanItemDone(){
  // Pause timer
  if(!practicePaused){practicePaused=true;pauseStart=Date.now();}
  
  var item=planItems?planItems[planIndex]:null;
  var nextItem=planItems&&planIndex+1<planItems.length?planItems[planIndex+1]:null;
  var el=document.getElementById("v-practice");
  
  el.innerHTML='<div style="text-align:center;padding:30px 16px">'+
    '<div style="font-size:48px;margin-bottom:12px">⏰</div>'+
    '<div style="font-family:\'DM Serif Display\',serif;font-size:22px;margin-bottom:6px">Zeit ist um!</div>'+
    '<div style="font-size:13px;color:var(--muted);margin-bottom:16px">'+(item?esc(item.piece):'')+(item&&item.section?' · '+esc(item.section):'')+'</div>'+
    '<div style="display:flex;flex-direction:column;gap:8px">'+
      '<button class="btn btn-soft" onclick="extendPlanItem(5)">+5 Min verlängern</button>'+
      '<button class="btn btn-go" onclick="stopPractice(false)">'+(nextItem?'Weiter → '+esc(nextItem.piece):'Bewertung')+'</button>'+
      '<button class="btn btn-xs btn-soft" onclick="planActive=false;planItems=null;stopPractice(false)" style="color:var(--muted)">⏹ Plan beenden</button>'+
    '</div>'+
  '</div>';
}

function extendPlanItem(mins){
  planPieceCountdown+=mins*60;
  planWarningShown=false;
  // Resume
  if(practicePaused){totalPausedMs+=Date.now()-pauseStart;practicePaused=false;pauseStart=null;}
  renderPractice();
}

function showPlanWarning(){
  var warn=document.createElement('div');
  warn.id='plan-warning';
  warn.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--accent);color:#fff;border-radius:10px;font-size:14px;font-weight:600;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.2)';
  warn.textContent='⏰ Noch 1 Minute';
  document.body.appendChild(warn);
  setTimeout(function(){var w=document.getElementById('plan-warning');if(w)w.remove();},4000);
}

function startFromPlan(pid,secIdx){
  startPracticeFromDetail(pid,secIdx);
}

function buildSollIst(){
  var activePieces=pieces.filter(function(p){return p.status!=='ruhend';});
  if(!activePieces.length)return '';
  
  var allSecs=[];
  activePieces.forEach(function(p){
    (p.sections||[]).forEach(function(s){
      if(s.targetBpm){
        var last=getSecLast(p.name,s.name);
        allSecs.push({pct:last?Math.min(100,Math.round(last/s.targetBpm*100)):0});
      }
    });
  });
  var overallPct=allSecs.length?Math.round(allSecs.reduce(function(a,s){return a+s.pct;},0)/allSecs.length):0;
  var atTarget=allSecs.filter(function(s){return s.pct>=100;}).length;
  var perfReady=countPerformanceReady();
  
  return '<div class="card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
      '<div><div style="font-size:13px;font-weight:600">Gesamtfortschritt</div>'+
        '<div style="font-size:11px;color:var(--muted)">'+atTarget+' von '+allSecs.length+' Abschnitte auf Ziel</div></div>'+
      '<div style="font-family:\'DM Serif Display\',serif;font-size:28px;color:var(--accent)">'+overallPct+'%</div>'+
    '</div>'+
    '<div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:'+overallPct+'%"></div></div>'+
    (perfReady?'<div style="font-size:11px;color:var(--done);margin-top:8px">'+perfReady+' Stück'+(perfReady>1?'e':'')+' auftrittssicher</div>':'')+
  '</div>';
}

function buildWeekOverview(){
  if(!sessions.length)return '';
  var html='';
  for(var w=0;w<4;w++){
    var start=new Date(getMonday());start.setDate(start.getDate()-w*7);
    var end=new Date(start);end.setDate(end.getDate()+7);
    var wSess=sessions.filter(function(s){var d=new Date(s.date);return d>=start&&d<end;});
    var mins=wSess.reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
    var count=wSess.length;
    var label=w===0?'Diese Woche':w===1?'Letzte Woche':'Vor '+w+' Wochen';
    var pct=Math.min(100,Math.round(mins/(settings.weeklyMin||300)*100));
    
    html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
      '<div style="min-width:90px;font-size:11px;color:var(--muted)">'+label+'</div>'+
      '<div style="flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:var(--progress);border-radius:4px"></div></div>'+
      '<div style="min-width:55px;text-align:right;font-size:12px;font-weight:600">'+mins+' Min</div>'+
    '</div>';
  }
  return '<div class="card"><div class="stitle" style="margin-bottom:8px">Wochen</div>'+html+'</div>';
}
function renderLog(){
  var el=document.getElementById("v-log");
  if(!sessions.length){
    el.innerHTML='<div class="stitle">Tagebuch</div><div class="empty"><div style="font-size:28px;margin-bottom:8px">📝</div>Noch keine Einträge.<br>Nach deiner ersten Übung erscheint hier dein Tagebuch.</div>';
    return;
  }
  
  // Group by date (newest first)
  var days={};
  var sorted=[].concat(sessions).reverse();
  sorted.forEach(function(s,si){
    var realIdx=sessions.length-1-si;
    var dayStr=new Date(s.date).toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    if(!days[dayStr])days[dayStr]={label:dayStr,entries:[]};
    (s.pieces||[]).forEach(function(sp){
      days[dayStr].entries.push({
        sessionIdx:realIdx,
        date:s.date,
        name:sp.name,
        section:sp.section,
        mode:sp.mode||'ueben',
        totalSec:sp.totalSec||s.totalSec,
        rounds:sp.rounds||[],
        techRating:sp.techRating||0,
        exprRating:sp.exprRating||0,
        flowRating:sp.flowRating||0,
        errorFree:sp.errorFree,
        note:sp.note||'',
        // Also check v3-style ratings stored in session
        ratings:s.ratings||{}
      });
    });
  });
  
  var html='<div class="stitle">Tagebuch</div>';
  var dayIdx=0;
  
  Object.keys(days).forEach(function(dayKey){
    var day=days[dayKey];
    var totalMin=day.entries.reduce(function(a,e){return a+Math.round(e.totalSec/60);},0);
    var pieceNames=[];
    day.entries.forEach(function(e){if(pieceNames.indexOf(e.name)<0)pieceNames.push(e.name);});
    var summary=pieceNames.slice(0,3).join(', ')+(pieceNames.length>3?' +':'');
    var di=dayIdx++;
    
    // Build entries HTML
    var entriesHtml='';
    day.entries.forEach(function(e){
      var mins=Math.round(e.totalSec/60);
      var modeBadge=e.mode==='spielen'?'<span class="badge badge-spielen">🎭</span>':e.mode==='primetime'?'<span class="badge" style="background:var(--accent-soft);color:var(--accent)">✨</span>':'<span class="badge badge-ueben">🔧</span>';
      var time=new Date(e.date).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      
      var ratHtml='';
      if(e.techRating)ratHtml+='<span style="color:var(--accent4)">'+'★'.repeat(e.techRating)+'</span> ';
      if(e.exprRating)ratHtml+='<span style="color:var(--accent4)">'+'★'.repeat(e.exprRating)+'</span> ';
      if(e.flowRating)ratHtml+='<span style="color:var(--accent4)">'+'★'.repeat(e.flowRating)+'</span> ';
      if(e.errorFree===true)ratHtml+='<span style="color:var(--done)">✅</span> ';
      
      var tempoHtml='';
      if(e.rounds&&e.rounds.length){
        var maxBpm=Math.max.apply(null,e.rounds.map(function(r){return r.bpm;}));
        var minBpm=Math.min.apply(null,e.rounds.map(function(r){return r.bpm;}));
        tempoHtml=minBpm===maxBpm?maxBpm+' BPM':minBpm+'–'+maxBpm+' BPM';
      }
      
      entriesHtml+='<div style="padding:8px 0;border-bottom:1px solid var(--border)">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div>'+modeBadge+' <span style="font-weight:600;font-size:13px">'+esc(e.name)+'</span>'+
            (e.section?' <span style="font-size:11px;color:var(--muted)">· '+esc(e.section)+'</span>':'')+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:6px">'+
            '<span style="font-size:10px;color:var(--muted)">'+time+'</span>'+
            '<span style="font-size:13px;font-weight:600;color:var(--accent)">'+mins+'\'</span>'+
            '<button class="rm-btn" style="width:20px;height:20px;font-size:9px" onclick="editLogTime('+e.sessionIdx+',\''+esc(e.name).replace(/'/g,"\\'")+'\')">✏️</button>'+
          '</div>'+
        '</div>'+
        (tempoHtml||ratHtml||e.note?'<div style="margin-top:3px">'+
          (tempoHtml?'<span style="font-size:10px;color:var(--accent2)">♩ '+tempoHtml+'</span> ':'')+
          (ratHtml?'<span style="font-size:10px">'+ratHtml+'</span>':'')+
        '</div>':'')+
        (e.note?'<div style="font-size:11px;color:var(--text);margin-top:3px;padding:4px 6px;background:var(--surface2);border-radius:4px;font-style:italic">💬 '+esc(e.note)+'</div>':'')+
      '</div>';
    });
    
    html+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:8px">'+
      '<div onclick="toggleLogDay('+di+')" style="padding:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center">'+
        '<div><div style="font-size:13px;font-weight:600">'+day.label+'</div>'+
          '<div style="font-size:11px;color:var(--muted);margin-top:1px">'+esc(summary)+'</div></div>'+
        '<div style="text-align:right"><span style="font-size:14px;font-weight:600;color:var(--accent)">'+totalMin+'\'</span>'+
          ' <span style="font-size:12px;color:var(--muted)" id="log-arrow-'+di+'">▼</span></div>'+
      '</div>'+
      '<div id="log-body-'+di+'" style="display:none;padding:0 12px 8px;border-top:1px solid var(--border)">'+entriesHtml+'</div>'+
    '</div>';
  });
  
  el.innerHTML=html;
}

function toggleLogDay(idx){

  if(body.style.display==='none'){

function confirmEditEntry(sessionIdx,pieceName){
  var timeInput=document.getElementById('edit-time-input');
  var noteInput=document.getElementById('edit-note-input');
  if(!timeInput)return;
  var mins=parseInt(timeInput.value)||0;
  var note=noteInput?noteInput.value.trim():'';
  var s=sessions[sessionIdx];if(!s)return;
  var sp=(s.pieces||[]).find(function(p){return p.name===pieceName;});
  if(sp){
    sp.totalSec=mins*60;
    sp.note=note;
    s.totalSec=(s.pieces||[]).reduce(function(a,p){return a+(p.totalSec||0);},0);
    save();
  }
  var overlay=document.getElementById('edit-overlay');
  if(overlay)overlay.remove();
  renderLog();
}

}

  btn.dataset.ready='1';

  btn.style.background='#c0392b';btn.style.color='#fff';

    '</div>'+

      '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Claude AI</div>'+

}

function toggleDay(d){
  var idx=(settings.days||[]).indexOf(d);
  if(idx>=0)settings.days.splice(idx,1);
  else settings.days.push(d);
  save();renderSettings();
}

function addCat(){
  var input=document.getElementById('new-cat');
  if(!input||!input.value.trim())return;
  CATS.push(input.value.trim());
  save();renderSettings();
}

function delCat(ci){
  CATS.splice(ci,1);
  save();renderSettings();
}

function moveCat(ci,dir){
  var temp=CATS[ci];
  CATS[ci]=CATS[ci+dir];
  CATS[ci+dir]=temp;
  save();renderSettings();
}

function exportData(){
  var data={
    pieces:pieces,sessions:sessions,tempoHist:tempoHist,
    settings:settings,cats:CATS,rewards:rewards,lesson:lesson,
    analysisCache:analysisCache,
    lessonArchive:JSON.parse(localStorage.getItem('uz-lesson-archive')||'[]'),
    version:'v3.0',exportDate:new Date().toISOString()
  };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  var d=new Date();
  a.download='uebezeit-'+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+'_'+d.getHours()+'-'+d.getMinutes()+'.json';
  a.href=URL.createObjectURL(blob);
  a.click();
}

function importData(event){
  var file=event.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      
      // Detect v2 format (has CATS instead of cats, pieces without status)
      var isV2=data.CATS&&!data.cats;
      
      // Import pieces with migration
      if(data.pieces){
        pieces=data.pieces.map(function(p){
          p.links=p.links||[];
          p.status=p.status||'aktiv';
          if(!p.sections||!p.sections.length){
            // v2: sections might exist but without mode/focus
            // or might not exist at all (very old format)
            p.sections=[{id:1,name:'1-Ende',mode:'ueben',startBpm:p.startBpm||0,targetBpm:p.targetBpm||0,focus:['sauberkeit']}];
          }
          p.sections=p.sections.map(function(s){
            s.mode=s.mode||'ueben';
            s.focus=s.focus||['sauberkeit'];
            return s;
          });
          return p;
        });
      }
      
      // Sessions (format is compatible)
      if(data.sessions)sessions=data.sessions;
      
      // Tempo history (format is compatible)
      if(data.tempoHist)tempoHist=data.tempoHist;
      
      // Settings migration
      if(data.settings){
        settings.weeklyMin=data.settings.weeklyMin||settings.weeklyMin;
        settings.days=data.settings.days||settings.days;
        settings.name=data.settings.name||settings.name;
        settings.apiKey=data.settings.apiKey||settings.apiKey;
        settings.sessionMin=data.settings.sessionMin||settings.sessionMin;
        settings.greeting=data.settings.greeting||settings.greeting;
      }
      
      // Categories (v2 uses CATS, v3 uses cats)
      if(data.CATS)CATS=data.CATS;
      else if(data.cats)CATS=data.cats;
      
      // Rewards (format is compatible)
      if(data.rewards)rewards=data.rewards;
      
      // Lesson data
      if(data.lesson)lesson=data.lesson;
      
      // Analysis cache
      if(data.analysisCache)analysisCache=data.analysisCache;
      
      // Lesson archive (v3 only)
      if(data.lessonArchive){
        try{localStorage.setItem('uz-lesson-archive',JSON.stringify(data.lessonArchive));}catch(x){}
      }
      
      save();
      
      var msg='Import erfolgreich! '+pieces.length+' Stücke, '+sessions.length+' Einträge.';
      if(isV2)msg+=' (v2-Daten migriert)';
      renderSettings();
      // Show success message inline
      var resultEl=document.getElementById('import-result');
      if(resultEl)resultEl.innerHTML='<div style="font-size:12px;color:var(--done);margin-top:8px">✅ '+msg+'</div>';
    }catch(err){
      var resultEl=document.getElementById('import-result');
      if(resultEl)resultEl.innerHTML='<div style="font-size:12px;color:red;margin-top:8px">Import fehlgeschlagen: '+err.message+'</div>';
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

var resetStep=0;
function resetAll(){
  if(resetStep===0){
    resetStep=1;
    var btn=event.target;
    btn.textContent='⚠️ Wirklich ALLES löschen?';
    btn.style.background='#c0392b';btn.style.color='#fff';
    setTimeout(function(){resetStep=0;btn.textContent='Komplett-Reset';btn.style.background='';btn.style.color='';},4000);
    return;
  }
  try{localStorage.clear();}catch(e){}
  location.reload();
}

// === HELPERS ===
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function fmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function fmtDate(iso){var d=new Date(iso);return d.toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short"})+" · "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});}
function getMonday(d){var dt=new Date(d||new Date());var day=dt.getDay();var diff=day===0?6:day-1;dt.setDate(dt.getDate()-diff);dt.setHours(0,0,0,0);return dt;}

}
