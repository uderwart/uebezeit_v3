<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#faf4ee">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Übezeit&quot;,&quot;short_name&quot;:&quot;Übezeit&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23faf4ee&quot;,&quot;theme_color&quot;:&quot;%23faf4ee&quot;}">
<title>Übezeit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === FARBEN & VARIABLEN === */
:root {
  /* Basis – wärmer, weicher als v2 */
  --bg: #faf4ee;
  --surface: #ffffff;
  --surface2: #f0e9df;
  --border: #e4d9cc;
  --text: #2a2320;
  --muted: #8a7e74;

  /* Akzente – weniger aggressiv */
  --accent: #c76a4a;       /* Terrakotta – Hauptfarbe */
  --accent-soft: #e9d0c0;  /* Heller Akzent für Hintergründe */
  --accent2: #2a9d8f;      /* Teal – Tempo, Üben */
  --accent3: #a4546e;      /* Mauve – Spielen */
  --accent4: #b07d3a;      /* Gold – Sterne */

  /* Fortschritt – sanfter Verlauf statt hart grün/rot */
  --progress: #2a9d8f;     /* Fortschritt */
  --progress-soft: #b8ddd7; /* Heller Fortschritt */
  --done: #5daa68;         /* Erledigt – sanftes Grün */

  /* Layout */
  --nav-h: 58px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --radius: 14px;
  --shadow: 0 2px 14px rgba(88, 52, 28, 0.06);
}

/* === RESET === */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: contain;
  padding-bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
  min-height: 100dvh;
}

/* === APP CONTAINER === */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 16px 20px;
}

/* === TYPOGRAFIE === */
h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  color: var(--text);
  letter-spacing: -0.3px;
  font-weight: 400;
}
h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.15rem;
  color: var(--text);
  font-weight: 400;
}
.sub { color: var(--muted); font-size: 0.72rem; margin-top: 2px; }
.stitle {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 8px;
}
.shdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

/* === NAVIGATION (Fixed Bottom) === */
.nav {
  display: flex;
  background: var(--surface);
  padding: 6px 8px calc(6px + var(--safe-b));
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 16px rgba(88, 52, 28, 0.05);
}
.nav button {
  flex: 1;
  padding: 8px 4px 6px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: color 0.2s;
  min-height: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.nav button.on { color: var(--accent); }
.nav-icon { font-size: 18px; line-height: 1; }

/* === KARTEN === */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}

/* === LAYOUT HELPERS === */
.row { display: flex; gap: 8px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 6px; }
.flex1 { flex: 1; min-width: 0; }
.mb8 { margin-bottom: 8px; }
.mb12 { margin-bottom: 12px; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }

/* === BUTTONS === */
.btn {
  padding: 14px 16px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  width: 100%;
  text-align: center;
  min-height: 44px;
  -webkit-appearance: none;
}
.btn:active { transform: scale(0.97); opacity: 0.9; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-go { background: var(--accent2); color: #fff; }
.btn-soft { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-stop { background: #c0392b; color: #fff; }
.btn-sm { padding: 8px 14px; font-size: 13px; width: auto; min-height: 36px; }
.btn-xs { padding: 6px 12px; font-size: 11px; width: auto; min-height: 32px; }

/* === INPUTS === */
input[type="text"], input[type="number"], input[type="password"], input[type="date"], select, textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface);
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}

/* === STAT KACHELN === */
.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.stat {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat b {
  font-family: 'DM Serif Display', serif;
  font-size: 1.5rem;
  color: var(--accent);
  display: block;
}
.stat span {
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* === FORTSCHRITTSBALKEN === */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--progress);
  transition: width 0.4s;
}

/* === STÜCKE === */
.piece {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: box-shadow 0.2s;
  box-shadow: var(--shadow);
}
.piece:active { box-shadow: 0 1px 4px rgba(88, 52, 28, 0.1); }
.piece-name { font-weight: 600; font-size: 14px; }
.piece-cat { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

/* === TIMER === */
.timer-big {
  font-family: 'DM Serif Display', serif;
  font-size: 64px;
  color: var(--text);
  line-height: 1;
  letter-spacing: -2px;
}

/* === TEMPO === */
.tempo-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-appearance: none;
  box-shadow: var(--shadow);
}
.tempo-btn:active { background: var(--surface2); transform: scale(0.95); }

/* === STERNE === */
.star {
  border: none;
  background: none;
  font-size: 28px;
  cursor: pointer;
  padding: 4px;
  color: var(--border);
  transition: color 0.15s;
}
.star.on { color: var(--accent4); }

/* === BADGE === */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  vertical-align: middle;
}
.badge-ueben { background: var(--accent2); color: #fff; }
.badge-spielen { background: var(--accent3); color: #fff; }
.badge-done { background: var(--done); color: #fff; }
.badge-soft { background: var(--surface2); color: var(--muted); }

/* === VIEWS === */
.view { display: none; }
.view.on { display: block; }

/* === REMOVE BUTTON === */
.rm-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rm-btn:active { background: var(--surface2); }

/* === ADD BUTTON === */
.add-btn {
  width: 100%;
  padding: 10px;
  border: 2px dashed var(--border);
  border-radius: 10px;
  background: none;
  color: var(--accent2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

/* === LOG === */
.log-entry {
  padding: 12px;
  background: var(--surface);
  border-radius: var(--radius);
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}

/* === ROUNDS === */
.rounds { margin-top: 10px; text-align: left; }
.round-item { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.round-item:last-child { border: none; }

/* === REWARD CARD === */
.reward-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border-left: 4px solid var(--accent4);
  box-shadow: var(--shadow);
}

/* === CELEBRATION === */
.celebration {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* === EMPTY STATE === */
.empty {
  text-align: center;
  color: var(--muted);
  padding: 24px;
  font-size: 13px;
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px">
    <div>
      <h1>🎸 Übezeit</h1>
      <div class="sub">Akustik · Fingerpicking</div>
    </div>
    <div id="streak-box" style="display:none;text-align:right">
      <div id="streak-val" style="font-size:20px;color:var(--accent)"></div>
      <div style="font-size:10px;color:var(--muted)">Tage Serie</div>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="on" onclick="nav('home')"><span class="nav-icon">🎸</span>Üben</button>
    <button onclick="nav('lesson')"><span class="nav-icon">🎓</span>Unterricht</button>
    <button onclick="nav('stats')"><span class="nav-icon">📈</span>Fortschritt</button>
    <button onclick="nav('log')"><span class="nav-icon">📝</span>Tagebuch</button>
  </div>

  <!-- VIEWS -->
  <div class="view on" id="v-home">
    <div class="card" style="text-align:center;padding:20px;margin-top:20px">
      <div style="font-size:28px;margin-bottom:8px">⏳</div>
      <div style="font-size:14px;color:var(--muted)">Laden...</div>
      <button class="btn btn-soft mt12" onclick="try{localStorage.clear();}catch(x){}location.reload()">Falls leer: Hier tippen zum Reset</button>
    </div>
  </div>
  <div class="view" id="v-lesson"></div>
  <div class="view" id="v-stats"></div>
  <div class="view" id="v-log"></div>
  <div class="view" id="v-detail"></div>
  <div class="view" id="v-practice"></div>
  <div class="view" id="v-settings"></div>

</div>

<script>
// === ÜBEZEIT v3.0 ===

// Polyfill
if(typeof structuredClone==='undefined'){window.structuredClone=function(o){return JSON.parse(JSON.stringify(o));};}

// === FOKUS-KATEGORIEN (vordefiniert) ===
var FOCUS_OPTIONS=[
  {key:'sauberkeit',label:'Sauberkeit',type:'stars'},
  {key:'langsam',label:'Langsam genug',type:'stars'},
  {key:'ausdruck',label:'Ausdruck',type:'stars'},
  {key:'flow',label:'Im Fluss',type:'stars'},
  {key:'kraft',label:'Kraft / Ausdauer',type:'stars'},
  {key:'gleichmaessig',label:'Gleichmäßigkeit',type:'stars'},
  {key:'fehlerfrei',label:'Fehlerfrei',type:'yesno'}
];

// === DEFAULT STÜCKE ===
var DEF_PIECES=[
  {id:1,name:"Erstes Stück",cat:"Fingerstyle",note:"",status:"aktiv",links:[],sections:[{id:1,name:"1-Ende",mode:"ueben",startBpm:60,targetBpm:80,focus:["sauberkeit"]}]}
];

// === DEFAULT KATEGORIEN ===
var DEF_CATS=["Fingerstyle","Fingerstyle Klassik","Picking","Song","Aufwärmen"];
var CAT_COLORS=["#c76a4a","#2a9d8f","#a4546e","#b07d3a","#6b8193","#7c9070","#c9a84c"];

// === DATEN LADEN ===
var CATS,pieces,sessions,tempoHist,settings,rewards,lesson,analysisCache;
try{
  CATS=JSON.parse(localStorage.getItem("uz-cats"))||[].concat(DEF_CATS);
  pieces=JSON.parse(localStorage.getItem("uz-pieces"))||structuredClone(DEF_PIECES);
  sessions=JSON.parse(localStorage.getItem("uz-sessions"))||[];
  tempoHist=JSON.parse(localStorage.getItem("uz-tempo"))||{};
  settings=JSON.parse(localStorage.getItem("uz-settings"))||{weeklyMin:420,days:[1,2,3,4,5],name:'',apiKey:''};
  rewards=JSON.parse(localStorage.getItem("uz-rewards"))||{tiers:{bronze:{reward:'',unlocked:false,celebrated:false},silver:{reward:'',unlocked:false,celebrated:false},gold:{reward:'',unlocked:false,celebrated:false},diamond:{reward:'',unlocked:false,celebrated:false}}};
  lesson=JSON.parse(localStorage.getItem("uz-lesson"))||{nextDate:null,lastLessonDate:null,questions:[],feedback:'',planMinutes:30};
  analysisCache=JSON.parse(localStorage.getItem("uz-analysis")||'{}');
}catch(e){
  CATS=[].concat(DEF_CATS);
  pieces=structuredClone(DEF_PIECES);
  sessions=[];tempoHist={};
  settings={weeklyMin:420,days:[1,2,3,4,5],name:'',apiKey:''};
  rewards={tiers:{bronze:{reward:'',unlocked:false,celebrated:false},silver:{reward:'',unlocked:false,celebrated:false},gold:{reward:'',unlocked:false,celebrated:false},diamond:{reward:'',unlocked:false,celebrated:false}}};
  lesson={nextDate:null,lastLessonDate:null,questions:[],feedback:'',planMinutes:30};
  analysisCache={};
}
// Migration: alte Stücke ohne sections/status/focus
try{
  pieces=pieces.map(function(p){
    p.links=p.links||[];
    p.status=p.status||'aktiv';
    if(!p.sections||!p.sections.length){
      p.sections=[{id:1,name:p.note||'1-Ende',mode:'ueben',startBpm:p.startBpm||0,targetBpm:p.targetBpm||0,focus:['sauberkeit']}];
    }
    p.sections=p.sections.map(function(s){
      s.mode=s.mode||'ueben';
      s.focus=s.focus||['sauberkeit'];
      return s;
    });
    return p;
  });
}catch(e){pieces=structuredClone(DEF_PIECES);}

// === SAVE ===
function save(){
  try{
    localStorage.setItem("uz-pieces",JSON.stringify(pieces));
    localStorage.setItem("uz-sessions",JSON.stringify(sessions));
    localStorage.setItem("uz-tempo",JSON.stringify(tempoHist));
    localStorage.setItem("uz-settings",JSON.stringify(settings));
    localStorage.setItem("uz-cats",JSON.stringify(CATS));
    localStorage.setItem("uz-rewards",JSON.stringify(rewards));
    localStorage.setItem("uz-lesson",JSON.stringify(lesson));
  }catch(e){}
}

// === TEMPO HELPERS ===
function secKey(pName,sName){return pName+'::'+sName;}
function getLast(n){var h=tempoHist[n]||[];return h.length?h[h.length-1].bpm:0;}
function getHist(n){return tempoHist[n]||[];}
function getSecLast(pName,sName){return getLast(secKey(pName,sName))||getLast(pName);}
function getSecHist(pName,sName){var h=getHist(secKey(pName,sName));return h.length?h:getHist(pName);}

// === STREAK ===
function calcStreak(){
  if(!sessions.length)return 0;
  var days=new Set(sessions.map(function(s){return new Date(s.date).toDateString();}));
  var d=new Date();
  var streak=0;
  if(!days.has(d.toDateString()))d.setDate(d.getDate()-1);
  for(var i=0;i<365;i++){
    if(days.has(d.toDateString()))streak++;
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// === AUFTRITTSSICHER ===
function isPerformanceReady(pieceName){
  var recent=[];
  for(var i=sessions.length-1;i>=0;i--){
    (sessions[i].pieces||[]).forEach(function(sp){
      if(sp.name===pieceName&&sp.mode==='spielen'&&sp.errorFree!=null){
        recent.push(sp.errorFree);
      }
    });
  }
  if(recent.length<3)return {ready:false,streak:0,total:recent.length};
  var streak=0;
  for(var j=0;j<recent.length;j++){
    if(recent[j])streak++;else break;
  }
  return {ready:streak>=3,streak:streak,total:recent.length};
}
function countPerformanceReady(){
  var count=0;
  pieces.forEach(function(p){if(isPerformanceReady(p.name).ready)count++;});
  return count;
}

// State flags
var practicing=false;

// === NAV ===
function nav(v){
  // Guard: wenn gerade geübt wird, erst bestätigen
  if(practicing&&v!=='practice'&&v!=='detail'){
    if(!confirm("Übung abbrechen?"))return;
    stopPractice(true);
  }
  document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
  var el=document.getElementById("v-"+v);
  if(el)el.classList.add("on");
  // Tab highlighting (nur die 4 Haupt-Tabs)
  document.querySelectorAll(".nav button").forEach(function(b,i){
    b.classList.toggle("on",["home","lesson","stats","log"][i]===v);
  });
  // Render
  if(v==="home") renderHome();
  if(v==="lesson") renderLesson();
  if(v==="stats") renderStats();
  if(v==="log") renderLog();
  if(v==="settings") renderSettings();
}

// Navigate to detail view for a piece
function showDetail(id){
  document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
  document.getElementById("v-detail").classList.add("on");
  renderDetail(id);
}

// === HOME ===
function renderHome(){
  var el=document.getElementById("v-home");
  var hour=new Date().getHours();
  var name=settings.name?' '+esc(settings.name):'';
  var defaultGreeting=hour<12?'Guten Morgen'+name:hour<18?'Schön, dass du da bist'+name:'Noch ein paar Minuten Musik?';
  var greeting=settings.greeting||defaultGreeting;
  
  // Stats
  var todayStart=new Date();todayStart.setHours(0,0,0,0);
  var todayMin=sessions.filter(function(s){return new Date(s.date)>=todayStart;}).reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  var totalMin=sessions.reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  var streak=calcStreak();
  
  // Week
  var weekStart=getMonday();
  var weekMin=sessions.filter(function(s){return new Date(s.date)>=weekStart;}).reduce(function(a,s){return a+Math.round(s.totalSec/60);},0);
  var weekPct=Math.min(100,Math.round(weekMin/settings.weeklyMin*100));
  
  // Streak display
  var streakHtml=streak>0?'<div class="stat"><b>'+streak+'</b><span>Tage Serie</span></div>':'<div class="stat"><b>–</b><span>Tage Serie</span></div>';
  
  // Sort pieces: hausaufgabe first, then aktiv, ruhend hidden
  var hwPieces=pieces.filter(function(p){return p.status==='hausaufgabe';});
  var activePieces=pieces.filter(function(p){return p.status==='aktiv';});
  var ruhenPieces=pieces.filter(function(p){return p.status==='ruhend';});
  
  var hwHtml='';
  if(hwPieces.length){
    hwHtml='<div class="stitle mt12">Hausaufgaben</div>';
    hwPieces.forEach(function(p){hwHtml+=pieceCard(p);});
  }
  
  var activeHtml='';
  if(activePieces.length){
    activeHtml='<div class="stitle mt12">Stücke</div>';
    activePieces.forEach(function(p){activeHtml+=pieceCard(p);});
  }
  
  el.innerHTML=
    '<div style="text-align:center;padding:16px 0 8px">'+
      '<div style="font-family:\'DM Serif Display\',serif;font-size:20px;color:var(--text)">'+greeting+'</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:4px">'+new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})+'</div>'+
    '</div>'+
    '<div class="stats"><div class="stat"><b>'+todayMin+'</b><span>Min heute</span></div><div class="stat"><b>'+totalMin+'</b><span>Min gesamt</span></div>'+streakHtml+'</div>'+
    '<div class="card"><div class="stitle">Woche</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:500">'+weekMin+' / '+settings.weeklyMin+' Min</span><span style="font-size:12px;color:var(--muted)">'+weekPct+'%</span></div>'+
      '<div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:'+weekPct+'%"></div></div>'+
    '</div>'+
    hwHtml+activeHtml+
    (hwPieces.length+activePieces.length===0?'<div class="empty"><div style="font-size:28px;margin-bottom:8px">🎸</div>Noch keine Stücke.<br>Lege dein erstes Stück an!</div>':'')+
    '<button class="btn btn-go mt12" onclick="addPieceUI()">+ Neues Stück</button>'+
    '<button class="btn btn-soft mt8" onclick="nav(\'settings\')">⚙ Einstellungen</button>';
}

function pieceCard(p){
  var secs=p.sections||[];
  var pr=isPerformanceReady(p.name);
  
  // Last practiced
  var lastSess=sessions.filter(function(s){return(s.pieces||[]).some(function(sp){return sp.name===p.name;});});
  var daysSince=lastSess.length?Math.floor((Date.now()-new Date(lastSess[lastSess.length-1].date).getTime())/86400000):999;
  var lastText=daysSince===0?'Heute':daysSince===1?'Gestern':daysSince<999?'Vor '+daysSince+' Tagen':'';
  
  // Worst section progress
  var worstInfo=null;
  secs.forEach(function(s){
    if(!s.targetBpm)return;
    var last=getSecLast(p.name,s.name);
    var pct=last?Math.round(last/s.targetBpm*100):0;
    if(pct<100&&(!worstInfo||pct<worstInfo.pct))worstInfo={name:s.name,cur:last||0,tgt:s.targetBpm,pct:pct};
  });
  
  var badges='';
  if(pr.ready)badges+=' <span class="badge badge-done">Auftrittssicher</span>';
  else if(pr.total>0)badges+=' <span class="badge badge-soft">'+pr.streak+'/3</span>';
  if(p.status==='hausaufgabe')badges+=' <span class="badge" style="background:var(--accent-soft);color:var(--accent)">Hausaufgabe</span>';
  
  var infoText='';
  if(lastText)infoText+=lastText;
  if(worstInfo)infoText+=(infoText?' · ':'')+worstInfo.name+' '+worstInfo.cur+'/'+worstInfo.tgt;
  
  var catIdx=CATS.indexOf(p.cat);
  var catCol=CAT_COLORS[catIdx>=0?catIdx%CAT_COLORS.length:0];
  
  return '<div class="piece" onclick="showDetail('+p.id+')" style="border-left:4px solid '+catCol+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center"><div>'+
      '<div class="piece-name">'+esc(p.name)+badges+'</div>'+
      '<div class="piece-cat" style="color:'+catCol+'">'+esc(p.cat)+(secs.length>1?' · '+secs.length+' Takte':'')+'</div>'+
    '</div><span style="font-size:14px;color:var(--muted)">→</span></div>'+
    (infoText?'<div style="font-size:11px;color:var(--muted);margin-top:4px">'+infoText+'</div>':'')+
  '</div>';
}

function savePieceFields(id){
  var p=pieces.find(function(x){return x.id===id;});
  if(!p)return;
  // Read piece-level fields
  document.querySelectorAll('[data-piece="'+id+'"][data-field]').forEach(function(el){
    var f=el.dataset.field;
    if(el.dataset.sec!==undefined){
      var si=parseInt(el.dataset.sec);
      if(p.sections[si]){
        if(f==='startBpm'||f==='targetBpm')p.sections[si][f]=parseInt(el.value)||0;
        else p.sections[si][f]=el.value;
      }
    }else if(el.dataset.link!==undefined){
      var li=parseInt(el.dataset.link);
      if(p.links[li])p.links[li][f]=el.value;
    }else{
      p[f]=el.tagName==='SELECT'?el.value:el.value;
    }
  });
  save();
}

function setSectionMode(pid,si,mode){
  savePieceFields(pid);
  var p=pieces.find(function(x){return x.id===pid;});
  if(p&&p.sections[si]){p.sections[si].mode=mode;save();editPiece(pid);}
}

function toggleSectionFocus(pid,si,key){
  savePieceFields(pid);
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p||!p.sections[si])return;
  var f=p.sections[si].focus||[];
  var idx=f.indexOf(key);
  if(idx>=0)f.splice(idx,1);else f.push(key);
  if(!f.length)f.push('sauberkeit');// min 1
  p.sections[si].focus=f;
  save();editPiece(pid);
}

function addCustomFocus(pid,si){
  var input=document.getElementById('custom-focus-'+pid+'-'+si);
  if(!input||!input.value.trim())return;
  savePieceFields(pid);
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p||!p.sections[si])return;
  var key=input.value.trim();
  if(p.sections[si].focus.indexOf(key)<0){
    p.sections[si].focus.push(key);
    save();
  }
  editPiece(pid);
}

function addSection(pid){
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p)return;
  var maxId=(p.sections||[]).reduce(function(a,s){return Math.max(a,s.id||0);},0);
  p.sections.push({id:maxId+1,name:'Neue Takte',mode:'ueben',startBpm:0,targetBpm:0,focus:['sauberkeit']});
  save();editPiece(pid);
}

function delSection(pid,si){
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p||p.sections.length<=1){alert('Mindestens ein Abschnitt nötig.');return;}
  savePieceFields(pid);
  p.sections.splice(si,1);
  save();editPiece(pid);
}

function addLink(pid,type){
  var p=pieces.find(function(x){return x.id===pid;});
  if(p){p.links.push({label:'',url:'',type:type});save();editPiece(pid);}
}

function removeLink(pid,li){
  var p=pieces.find(function(x){return x.id===pid;});
  if(p){p.links.splice(li,1);save();editPiece(pid);}
}

function delPiece(id){
  pieces=pieces.filter(function(x){return x.id!==id;});
  save();nav('home');
}

var practiceStart=null,practiceElapsed=0,practiceTimer=null;
var practicePaused=false,pauseStart=null,totalPausedMs=0;
var currentTempo=80,roundStart=null,rounds=[];
var sessionTotalElapsed=0;
var pendingEntry=null;

// Pomodoro
var POMO_WORK=25*60,POMO_BREAK=5*60;
var pomoBreakActive=false,pomoBreakTimer=null,pomoBreakRemaining=0;

// Metronome
var audioCtx=null,metroOn=false,metroInt=null,metroBpm=80,metroBt=0;

function startPracticeFromDetail(pid,si){
  var p=pieces.find(function(x){return x.id===pid;});
  if(!p)return;
  var sec=p.sections[si];if(!sec)return;
  
  practicePieceId=pid;
  practiceSectionIdx=si;
  practiceMode=sec.mode||'ueben';
  practiceElapsed=0;
  practicePaused=false;pauseStart=null;totalPausedMs=0;
  practiceStart=null;
  rounds=[];roundStart=null;
  practicing=true;
  
  if(practiceMode==='ueben'){
    currentTempo=sec.startBpm||getSecLast(p.name,sec.name)||sec.targetBpm||80;
  }
  
  document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
  document.getElementById("v-practice").classList.add("on");
  renderPractice();
}

function startPracticeTimer(){
  if(practiceStart)return;
  practiceStart=Date.now();
  roundStart=Date.now();
  practiceTimer=setInterval(function(){
    if(!practicePaused){
      practiceElapsed=Math.round((Date.now()-practiceStart-totalPausedMs)/1000);
      sessionTotalElapsed++;
      updatePracticeTimer();
      if(sessionTotalElapsed>0&&sessionTotalElapsed%POMO_WORK===0&&!pomoBreakActive){
        showPomoBreak();
      }
    }
  },1000);
  renderPractice();
}

function adjTempo(d){
  var newT=Math.max(20,Math.min(300,currentTempo+d));
  if(newT!==currentTempo){
    if(roundStart){
      var roundSec=Math.round((Date.now()-roundStart)/1000);
      if(roundSec>0)rounds.push({bpm:currentTempo,seconds:roundSec});
      roundStart=Date.now();
    }
    currentTempo=newT;
    var el=document.getElementById("tempo-display");if(el)el.textContent=currentTempo;
    updateRoundsDisplay();
    if(metroOn){metroBpm=currentTempo;mStop();mStart();}
  }
}

// === STOP PRACTICE ===
function stopPractice(abort){
  clearInterval(practiceTimer);
  if(metroOn)mStop();
  var p=pieces.find(function(x){return x.id===practicePieceId;});
  var sec=p?(p.sections||[])[practiceSectionIdx]:null;
  
  if(!abort&&p&&(practiceStart||practiceMode==='spielen')){
    if(practiceMode!=='spielen'&&roundStart){
      var roundSec=Math.round((Date.now()-roundStart)/1000);
      if(roundSec>0)rounds.push({bpm:currentTempo,seconds:roundSec});
    }
    var totalSec=practiceMode==='spielen'?practiceElapsed:(rounds.length?rounds.reduce(function(a,r){return a+r.seconds;},0):practiceElapsed);
    
    if(totalSec>0){
      // Save tempo
      if(practiceMode!=='spielen'&&sec&&rounds.length){
        var maxBpm=Math.max.apply(null,rounds.map(function(r){return r.bpm;}));
        var key=secKey(p.name,sec.name);
        if(!tempoHist[key])tempoHist[key]=[];
        tempoHist[key].push({date:new Date().toISOString(),bpm:maxBpm});
      }
      
      pendingEntry={
        pieceName:p.name,section:sec?sec.name:null,mode:practiceMode,
        rounds:practiceMode==='spielen'?[]:[].concat(rounds),
        totalSec:totalSec,ratings:{},errorFree:null,
        focus:sec?sec.focus:['sauberkeit']
      };
      save();
      practicing=false;practicePieceId=null;rounds=[];practiceStart=null;
      showRatingScreen();
      return;
    }
  }
  var lastPid=practicePieceId;
  practicing=false;practicePieceId=null;rounds=[];pendingEntry=null;practiceStart=null;
  if(lastPid)showDetail(lastPid);else nav('home');
}

function saveEntry(skip){
  var pName=pendingEntry?pendingEntry.pieceName:null;
  if(pendingEntry){
    var entry={
      date:new Date().toISOString(),
      pieceName:pendingEntry.pieceName,
      section:pendingEntry.section,
      mode:pendingEntry.mode,
      totalSec:pendingEntry.totalSec,
      rounds:pendingEntry.rounds,
      ratings:skip?{}:pendingEntry.ratings,
      errorFree:skip?null:pendingEntry.errorFree
    };
    sessions.push({
      date:entry.date,
      totalSec:entry.totalSec,
      pieces:[{
        name:entry.pieceName,section:entry.section,mode:entry.mode,
        rounds:entry.rounds,totalSec:entry.totalSec,
        techRating:entry.ratings.sauberkeit||0,
        exprRating:entry.ratings.ausdruck||0,
        overallRating:entry.ratings.flow||0,
        flowRating:entry.ratings.flow||0,
        errorFree:entry.errorFree
      }]
    });
    pendingEntry=null;
    save();
    localStorage.removeItem("uz-pending");
  }
  var lastPiece=pName?pieces.find(function(x){return x.name===pName;}):null;
  if(lastPiece)showDetail(lastPiece.id);else nav('home');
}

function togglePracticeMetro(){
  if(metroOn)mStop();
  else{metroBpm=currentTempo;mStart();}

  if(btn){btn.textContent=metroOn?'Stop':'♩';btn.style.background=metroOn?'#c0392b':'var(--accent2)';}
}

function mClick(accent){
  if(!audioCtx)return;
  try{
    var o=audioCtx.createOscillator();var g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=accent?1000:700;g.gain.value=accent?0.4:0.2;
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.06);
    o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.06);
  }catch(e){}
}

function mStart(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}
  if(audioCtx.state==='suspended')audioCtx.resume();
  metroBt=0;metroOn=true;
  var interval=Math.round(60000/metroBpm);
  setTimeout(function(){
    mClick(true);
    metroInt=setInterval(function(){
      metroBt=(metroBt+1)%4;
      mClick(metroBt===0);
    },interval);
  },100);
}

function mStop(){clearInterval(metroInt);metroOn=false;metroBt=0;}

function renderLog(){

    return;
  }
  
  // Group by date (newest first)
  var days={};
  var sorted=[].concat(sessions).reverse();
  sorted.forEach(function(s,si){
    var realIdx=sessions.length-1-si;
    var dayStr=new Date(s.date).toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    if(!days[dayStr])days[dayStr]={label:dayStr,entries:[]};
    (s.pieces||[]).forEach(function(sp){
      days[dayStr].entries.push({
        sessionIdx:realIdx,
        date:s.date,
        name:sp.name,
        section:sp.section,
        mode:sp.mode||'ueben',
        totalSec:sp.totalSec||s.totalSec,
        rounds:sp.rounds||[],
        techRating:sp.techRating||0,
        exprRating:sp.exprRating||0,
        flowRating:sp.flowRating||0,
        errorFree:sp.errorFree,
        // Also check v3-style ratings stored in session
        ratings:s.ratings||{}
      });
    });
  });
  
  var html='<div class="stitle">Tagebuch</div>';
  
  Object.keys(days).forEach(function(dayKey){
    var day=days[dayKey];
    var totalMin=day.entries.reduce(function(a,e){return a+Math.round(e.totalSec/60);},0);
    
    html+='<div style="margin-bottom:16px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
        '<div style="font-size:13px;font-weight:600">'+day.label+'</div>'+
        '<div style="font-size:12px;color:var(--muted)">'+totalMin+' Min</div>'+
      '</div>';
    
    day.entries.forEach(function(e){
      var mins=Math.round(e.totalSec/60);
      var modeBadge=e.mode==='spielen'?'<span class="badge badge-spielen">🎭</span>':'<span class="badge badge-ueben">🔧</span>';
      var time=new Date(e.date).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      
      // Ratings display
      var ratHtml='';
      if(e.techRating)ratHtml+='<span style="color:var(--accent4)">Sauberkeit '+'★'.repeat(e.techRating)+'</span> ';
      if(e.exprRating)ratHtml+='<span style="color:var(--accent4)">Ausdruck '+'★'.repeat(e.exprRating)+'</span> ';
      if(e.flowRating)ratHtml+='<span style="color:var(--accent4)">Flow '+'★'.repeat(e.flowRating)+'</span> ';
      if(e.errorFree===true)ratHtml+='<span style="color:var(--done)">✅ Fehlerfrei</span> ';
      if(e.errorFree===false)ratHtml+='<span style="color:var(--muted)">Noch auf dem Weg</span> ';
      
      // Tempo info
      var tempoHtml='';
      if(e.rounds&&e.rounds.length){
        var maxBpm=Math.max.apply(null,e.rounds.map(function(r){return r.bpm;}));
        var minBpm=Math.min.apply(null,e.rounds.map(function(r){return r.bpm;}));
        tempoHtml=minBpm===maxBpm?maxBpm+' BPM':minBpm+'–'+maxBpm+' BPM';
      }
      
      html+='<div class="log-entry">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div>'+modeBadge+' <span style="font-weight:600;font-size:13px">'+esc(e.name)+'</span>'+

        '</div>'+

    });

  el.innerHTML=html;

function editLogTime(sessionIdx,pieceName){
  var s=sessions[sessionIdx];if(!s)return;
  var sp=(s.pieces||[]).find(function(p){return p.name===pieceName;});
  if(!sp)return;
  var cur=Math.round(sp.totalSec/60);
  var el=document.createElement('div');
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px';
  el.innerHTML='<div class="card" style="max-width:300px;width:100%;text-align:center">'+

    '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">'+esc(pieceName)+'</div>'+
    '<input type="number" id="edit-time-input" value="'+cur+'" style="text-align:center;font-size:20px;margin-bottom:12px" min="0">'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:12px">Minuten</div>'+
    '<div style="display:flex;gap:8px"><button class="btn btn-go" onclick="confirmEditTime('+sessionIdx+',\''+esc(pieceName)+'\')">Speichern</button><button class="btn btn-soft" onclick="this.closest(\'div[style]\').remove()">Abbrechen</button></div>'+
  '</div>';
  document.body.appendChild(el);
}

function confirmEditTime(sessionIdx,pieceName){
  var input=document.getElementById('edit-time-input');
  if(!input)return;
  var mins=parseInt(input.value)||0;
  var s=sessions[sessionIdx];if(!s)return;
  var sp=(s.pieces||[]).find(function(p){return p.name===pieceName;});
  if(sp){
    sp.totalSec=mins*60;
    s.totalSec=(s.pieces||[]).reduce(function(a,p){return a+(p.totalSec||0);},0);
    save();
  }
  var overlay=input.closest('div[style*="fixed"]');
  if(overlay)overlay.remove();
  renderLog();
}

function deleteLogEntry(sessionIdx){
  if(!confirm('Eintrag löschen?'))return;
  sessions.splice(sessionIdx,1);
  save();
  renderLog();
}

      '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">Begrüßungstext</div>'+
      '<input type="text" value="'+esc(settings.greeting||'')+'" placeholder="Leer = automatisch je Tageszeit" onchange="settings.greeting=this.value.trim();save()">'+
      '<div style="font-size:10px;color:var(--muted);margin-top:4px">Leer lassen für automatisch (Guten Morgen / Schön, dass du da bist / Noch ein paar Minuten Musik?)</div>'+
    '</div>'+
    '<div class="empty"><div style="font-size:28px;margin-bottom:8px">⚙</div>Weitere Einstellungen kommen in Schritt 7</div>'+
    '<button class="btn btn-soft mt12" onclick="nav(\'home\')">← Zurück</button>'+
    '<div style="text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">'+
      '<div style="font-size:13px;color:var(--text);font-weight:500">🎸 Übezeit v3.0</div>'+
      '<div style="font-size:11px;color:var(--muted)">Build 2026-04-19-C</div>'+
    '</div>';
}

// === HELPERS ===
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function fmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function fmtDate(iso){var d=new Date(iso);return d.toLocaleDateString("de-DE",{weekday:"short",day:"numeric",month:"short"})+" · "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});}
function getMonday(d){var dt=new Date(d||new Date());var day=dt.getDay();var diff=day===0?6:day-1;dt.setDate(dt.getDate()-diff);dt.setHours(0,0,0,0);return dt;}

// === INIT ===
try{
  renderHome();
}catch(e){
  document.getElementById('v-home').innerHTML='<div class="card" style="text-align:center;padding:20px"><div style="font-size:28px;margin-bottom:8px">⚠️</div><div style="font-size:14px;color:red;margin-bottom:12px">Fehler: '+e.message+'</div><button class="btn btn-stop" onclick="localStorage.clear();location.reload()">Daten zurücksetzen & neu laden</button></div>';
}
</script>
